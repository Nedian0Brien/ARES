<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES Papers — Reading / Lab / Wiki / Agent (Workbench shell)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#fbfbfa; --sb:#f5f5f4; --s1:#ffffff; --s2:#f7f7f6; --s3:#f0efed;
  --b1:#e8e8e6; --b2:#d4d4d2;
  --tx:#0a0a0b; --t2:#4a4a50; --t3:#8a8a92; --t4:#b0b0b8;
  --read:#5e6ad2; --search:#5e9c6f; --research:#8957c9; --result:#c07b3a; --insight:#c04e68; --writing:#3aa3a3;
}
html, body { height:100%; }
body {
  font-family:'Inter',-apple-system,sans-serif;
  font-feature-settings:'cv11','ss01','ss03';
  background:var(--bg); color:var(--tx); overflow:hidden;
  -webkit-font-smoothing:antialiased; font-size:13px; letter-spacing:-0.006em;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes slideIn { from { transform:translateX(-8px); opacity:0; } to { transform:translateX(0); opacity:1; } }
@keyframes fadeUp { from { transform:translateY(6px); opacity:0; } to { transform:translateY(0); opacity:1; } }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-thumb { background:#d8d7d3; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#b8b7b3; }
button { font-family:inherit; }

.tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:1px 7px; border-radius:4px; background:var(--s2); color:var(--t2); border:1px solid var(--b1); white-space:nowrap; letter-spacing:-0.003em; }
.kbd { font-family:'Inter',sans-serif; font-size:10.5px; font-weight:500; color:var(--t3); background:var(--s1); border:1px solid var(--b1); border-radius:3px; padding:0 5px; min-width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center; }
.btn-p { background:#18181b; color:#fff; border:none; border-radius:6px; padding:5px 11px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.006em; white-space:nowrap; }
.btn-p:hover { background:#26262b; }
.btn-s { background:var(--s1); color:var(--tx); border:1px solid var(--b1); border-radius:6px; padding:4px 10px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.006em; white-space:nowrap; }
.btn-s:hover { background:var(--s2); border-color:var(--b2); }
.btn-ghost { background:transparent; color:var(--t2); border:none; border-radius:5px; padding:4px 8px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost:hover { background:rgba(0,0,0,0.04); color:var(--tx); }

.app { height:100vh; display:flex; flex-direction:column; background:var(--bg); }
.metabar { height:58px; flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--b1); padding:0 20px; display:flex; align-items:center; gap:14px; }
.metabar .title { font-size:14px; font-weight:550; letter-spacing:-0.012em; color:var(--tx); max-width:560px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.metabar .byline { color:var(--t3); font-size:12px; display:flex; align-items:center; gap:6px; margin-top:2px; }
.metabar .meta-actions { margin-left:auto; display:flex; align-items:center; gap:6px; }
.metabar .crumb-group { display:flex; align-items:center; gap:6px; color:var(--t3); font-size:12px; padding-right:14px; border-right:1px solid var(--b1); margin-right:6px; }

.main { flex:1; display:flex; min-height:0; }

/* ============ Product rail (B option: 56px = 4 top-level tabs) ============ */
.icon-rail { width:56px; flex-shrink:0; background:var(--sb); border-right:1px solid var(--b1); display:flex; flex-direction:column; align-items:center; padding:9px 0 10px; gap:3px; }
.rail-logo { width:30px; height:30px; border-radius:8px; background:linear-gradient(135deg,#5e6ad2,#8b5cf6); color:#fff; font-size:12.5px; font-weight:700; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(94,106,210,0.4); }
.rail-btn { width:42px; height:42px; border-radius:8px; border:none; background:transparent; color:var(--t3); cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; position:relative; transition:background 100ms, color 100ms; }
.rail-btn:hover { background:rgba(0,0,0,0.045); color:var(--t2); }
.rail-btn .lbl { font-size:9px; letter-spacing:0.01em; font-weight:500; }
.rail-btn .badge { position:absolute; top:2px; right:2px; background:var(--read); color:#fff; font-size:8.5px; font-weight:600; border-radius:6px; padding:0 3px; min-width:13px; height:13px; display:inline-flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; }
.rail-btn.active::before { content:''; position:absolute; left:-9px; top:9px; bottom:9px; width:2.5px; border-radius:2px; }
.rail-btn.active.t-reading { background:rgba(94,106,210,0.1); color:var(--read); }
.rail-btn.active.t-reading::before { background:var(--read); }
.rail-btn.active.t-lab { background:rgba(137,87,201,0.1); color:var(--research); }
.rail-btn.active.t-lab::before { background:var(--research); }
.rail-btn.active.t-wiki { background:rgba(94,156,111,0.1); color:var(--search); }
.rail-btn.active.t-wiki::before { background:var(--search); }
.rail-btn.active.t-agent { background:rgba(58,163,163,0.1); color:var(--writing); }
.rail-btn.active.t-agent::before { background:var(--writing); }
.rail-divider { width:24px; height:1px; background:var(--b1); margin:4px 0; }
.rail-spacer { flex:1; }
.rail-avatar { width:30px; height:30px; border-radius:50%; background:var(--s3); border:1px solid var(--b1); color:var(--t2); font-size:10.5px; font-weight:600; display:flex; align-items:center; justify-content:center; cursor:pointer; }
.rail-avatar:hover { border-color:var(--b2); }

/* ============ Float panel (section-internal nav, slides in) ============ */
.float-panel { width:288px; flex-shrink:0; background:var(--sb); border-right:1px solid var(--b1); display:flex; flex-direction:column; animation:slideIn 140ms ease-out; min-height:0; }
.fp-subnav { display:flex; gap:2px; padding:11px 12px 9px; }
.fp-subnav button { flex:1; height:27px; border:none; border-radius:6px; background:transparent; color:var(--t3); font-size:11.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; gap:5px; }
.fp-subnav button:hover { background:rgba(0,0,0,0.035); color:var(--t2); }
.fp-subnav button.on { background:var(--s1); color:var(--tx); box-shadow:inset 0 0 0 1px var(--b1); font-weight:550; }
.fp-search { margin:0 12px 10px; background:var(--s1); border:1px solid var(--b1); border-radius:6px; padding:6px 10px; display:flex; align-items:center; gap:7px; font-size:12px; color:var(--t3); }
.fp-search input { flex:1; background:transparent; border:none; outline:none; font-size:12px; color:var(--tx); font-family:inherit; }
.fp-body { flex:1; overflow:auto; padding:0 8px 10px; }

.fp-section { padding:0 12px 10px; }
.fp-section + .fp-section { border-top:1px solid var(--b1); padding-top:10px; margin-top:2px; }
.fp-section-h { display:flex; align-items:center; gap:6px; font-size:10.5px; color:var(--t3); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; padding:2px 2px 8px; }
.fp-section-h .count { margin-left:auto; color:var(--t4); font-family:'JetBrains Mono',monospace; font-weight:500; }
.fp-section-h .more { margin-left:4px; background:transparent; border:none; color:var(--t3); cursor:pointer; font-size:10.5px; padding:1px 5px; border-radius:3px; }
.fp-section-h .more:hover { background:rgba(0,0,0,0.04); color:var(--t2); }

.lib-item { padding:8px 10px; border-radius:6px; cursor:pointer; display:flex; flex-direction:column; gap:3px; margin-bottom:2px; }
.lib-item.active { background:rgba(94,106,210,0.06); }
.lib-item:hover:not(.active) { background:rgba(0,0,0,0.03); }
.lib-item .t { font-size:12.2px; line-height:1.35; letter-spacing:-0.008em; color:var(--tx); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.lib-item .m { font-size:10.5px; color:var(--t3); display:flex; align-items:center; gap:5px; }
.lib-item .bar { height:2px; border-radius:1px; background:var(--s3); overflow:hidden; margin-top:3px; }
.lib-item .bar > i { display:block; height:100%; background:var(--read); }
.outline-item { padding:6px 10px 6px 12px; display:flex; align-items:center; gap:8px; font-size:12.2px; color:var(--t2); border-radius:5px; cursor:pointer; border-left:2px solid transparent; margin:1px 0; }
.outline-item.active { background:rgba(94,106,210,0.05); border-left-color:var(--read); color:var(--tx); font-weight:550; }
.outline-item:hover:not(.active) { background:rgba(0,0,0,0.03); }

/* ============ Split (horizontal & vertical) ============ */
.split { flex:1; display:flex; min-width:0; position:relative; }
.split.vertical { flex-direction:column; min-height:0; }
.pane { display:flex; flex-direction:column; background:var(--bg); min-width:0; min-height:0; overflow:hidden; }
.pane-hdr { height:42px; flex-shrink:0; border-bottom:1px solid var(--b1); background:var(--s1); display:flex; align-items:center; padding:0 12px; gap:2px; }
.pane-tab { padding:6px 11px; font-size:12.5px; font-weight:500; color:var(--t3); border-radius:5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; position:relative; }
.pane-tab:hover { color:var(--t2); background:rgba(0,0,0,0.028); }
.pane-tab.active { color:var(--tx); }
.pane-tab.active::after { content:''; position:absolute; bottom:-11px; left:8px; right:8px; height:2px; background:var(--read); border-radius:1px 1px 0 0; }
.pane-actions { margin-left:auto; display:flex; align-items:center; gap:4px; }
.pane-icon-btn { width:26px; height:26px; border-radius:5px; background:transparent; border:none; color:var(--t3); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
.pane-icon-btn:hover { background:rgba(0,0,0,0.04); color:var(--t2); }
.pane-icon-btn.on { background:rgba(94,106,210,0.1); color:var(--read); }
.pane-body { flex:1; overflow:auto; position:relative; min-height:0; }

.resize { flex-shrink:0; background:var(--b1); position:relative; }
.resize.h { width:5px; cursor:col-resize; }
.resize.v { height:5px; cursor:row-resize; }
.resize:hover { background:var(--read); }
.resize.h::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:1px; height:22px; background:var(--b2); border-radius:1px; }
.resize.v::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); height:1px; width:22px; background:var(--b2); border-radius:1px; }

.orient-group { display:inline-flex; border:1px solid var(--b1); border-radius:6px; overflow:hidden; background:var(--s2); margin-right:2px; }
.orient-btn { width:26px; height:24px; border:none; background:transparent; color:var(--t3); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0; }
.orient-btn:hover { background:rgba(0,0,0,0.04); color:var(--t2); }
.orient-btn.on { background:var(--s1); color:var(--read); box-shadow:inset 0 0 0 1px rgba(94,106,210,0.3); }

.wb-strip { width:42px; flex-shrink:0; background:var(--sb); border-left:1px solid var(--b1); display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:4px; }
.wb-strip .rail-btn { width:32px; height:34px; }

.pdf { padding:24px 28px; display:flex; flex-direction:column; gap:16px; align-items:center; min-height:100%; background:#f4f3ef; }
.pdf-page { width:92%; max-width:600px; aspect-ratio:210/297; background:#fff; border:1px solid var(--b1); border-radius:4px; box-shadow:0 2px 6px rgba(15,15,15,0.04), 0 1px 2px rgba(15,15,15,0.03); padding:46px 52px 36px; font-family:'Times New Roman',Georgia,serif; font-size:10.8px; color:#1a1a1d; line-height:1.6; position:relative; }
.pdf-page h1 { font-size:15px; font-weight:700; line-height:1.3; margin-bottom:10px; color:#0a0a0b; }
.pdf-page .aut { font-size:10px; color:#3a3a3e; margin-bottom:10px; }
.pdf-page .abs-h { font-size:10.5px; font-weight:700; margin:8px 0 4px; }
.pdf-page p { margin-bottom:9px; text-align:justify; hyphens:auto; }
.pdf-page h2 { font-size:12px; font-weight:700; margin:12px 0 5px; }
.pdf-page .pgnum { position:absolute; bottom:18px; right:22px; font-size:9px; color:#8a8a92; }
.pdf-page .mk { background:rgba(94,106,210,0.13); border-bottom:2px solid var(--read); padding:1px 0; }
.pdf-page .mk.r { background:rgba(94,156,111,0.14); border-bottom-color:var(--search); }
.pdf-sep { font-size:11px; color:var(--t3); letter-spacing:0.06em; }

/* ---- PDF floating dock (interaction adapted from pdf-viewer-dock-v1) ---- */
.pdf-host { position:relative; height:100%; display:flex; flex-direction:column; min-height:0; }
.pdf-scroll { flex:1; overflow:auto; background:#f4f3ef; padding:24px 28px 94px; display:flex; flex-direction:column; gap:16px; align-items:center; scroll-behavior:smooth; }
.pdf-host .pdf-page { transform-origin:top center; transition:transform 240ms cubic-bezier(0.16,1,0.3,1); }
.dock-wrap { position:absolute; left:0; right:0; bottom:18px; display:flex; flex-direction:column; align-items:center; gap:8px; pointer-events:none; z-index:20; }
.sel-chip { display:flex; align-items:center; gap:8px; max-width:380px; background:var(--s1); border:1px solid var(--b1); border-radius:999px; padding:5px 7px 5px 13px; box-shadow:0 4px 16px rgba(15,15,15,0.12); pointer-events:auto; animation:fadeUp 180ms ease-out; }
.sel-chip .qi { color:var(--read); display:flex; flex-shrink:0; }
.sel-chip .q { font-size:11.5px; color:var(--t2); font-style:italic; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; letter-spacing:-0.01em; min-width:0; }
.sel-chip .x { flex-shrink:0; width:20px; height:20px; border-radius:50%; border:none; background:transparent; color:var(--t3); cursor:pointer; display:flex; align-items:center; justify-content:center; }
.sel-chip .x:hover { background:var(--s3); color:var(--tx); }
.dock { display:flex; align-items:center; gap:1px; background:var(--s1); border:1px solid var(--b1); border-radius:999px; padding:5px 6px; box-shadow:0 8px 26px rgba(15,15,15,0.16), 0 0 0 1px rgba(15,15,15,0.03); pointer-events:auto; }
.dock-btn { display:flex; align-items:center; justify-content:center; gap:5px; height:32px; min-width:32px; padding:0 9px; border:none; border-radius:999px; background:transparent; color:var(--t2); font-size:12.5px; font-weight:500; font-family:inherit; cursor:pointer; white-space:nowrap; letter-spacing:-0.01em; transition:background 120ms ease, color 120ms ease; }
.dock-btn:hover { background:var(--s2); color:var(--tx); }
.dock-btn.on { background:rgba(94,106,210,0.1); color:var(--read); }
.dock-btn.hl { color:#a8791f; }
.dock-btn.hl:hover { background:rgba(199,154,47,0.13); color:#86631a; }
.dock-btn.nt { color:var(--read); }
.dock-btn.nt:hover { background:rgba(94,106,210,0.1); }
.dock-zoom { font-family:'JetBrains Mono',monospace; font-size:11.5px; font-weight:600; color:var(--t3); min-width:40px; text-align:center; user-select:none; }
.dock-div { width:1px; height:18px; background:var(--b1); margin:0 3px; flex-shrink:0; }
.dock-pop { position:absolute; bottom:64px; left:50%; transform:translateX(-50%); background:var(--s1); border:1px solid var(--b1); border-radius:11px; box-shadow:0 14px 34px rgba(15,15,15,0.16), 0 0 0 1px rgba(15,15,15,0.03); pointer-events:auto; z-index:21; overflow:hidden; animation:fadeUp 160ms ease-out; }
.dock-pop .ph { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.08em; padding:10px 13px 8px; border-bottom:1px solid var(--b1); }
.dock-toc { width:264px; padding-bottom:6px; }
.toc-row { display:flex; align-items:baseline; gap:10px; padding:7px 13px; cursor:pointer; }
.toc-row:hover { background:var(--s2); }
.toc-row.cur { background:rgba(94,106,210,0.07); }
.toc-row .n { font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:600; color:var(--t4); min-width:16px; }
.toc-row .tt { font-size:12.5px; color:var(--tx); }
.toc-row.cur .tt { color:var(--read); font-weight:550; }
.dock-pages { width:330px; padding:10px 12px 12px; }
.pgrid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.pgi { display:flex; flex-direction:column; align-items:center; gap:5px; padding:6px 4px; border-radius:7px; cursor:pointer; }
.pgi:hover { background:var(--s2); }
.pgi.cur { background:rgba(94,106,210,0.07); }
.pgi.empty { opacity:0.4; cursor:default; }
.pgi.empty:hover { background:transparent; }
.pgt { width:52px; height:70px; background:#fff; border:1px solid var(--b1); border-radius:3px; padding:6px 5px; display:flex; flex-direction:column; gap:3px; box-shadow:0 1px 3px rgba(15,15,15,0.06); }
.pgi.cur .pgt { border-color:var(--read); box-shadow:0 0 0 2px rgba(94,106,210,0.25); }
.pgl { height:2.5px; border-radius:1px; background:var(--b2); }
.pgi.cur .pgl { background:rgba(94,106,210,0.5); }
.pgn { font-size:11px; font-weight:500; color:var(--t3); }
.pgi.cur .pgn { color:var(--read); font-weight:600; }
.pdf-toast { position:absolute; bottom:74px; left:50%; transform:translateX(-50%); background:var(--tx); color:#fff; font-size:12px; font-weight:500; padding:7px 15px; border-radius:999px; box-shadow:0 8px 22px rgba(15,15,15,0.22); z-index:30; pointer-events:none; animation:fadeUp 160ms ease-out; white-space:nowrap; }

.summary-wrap { padding:28px 36px; max-width:760px; margin:0 auto; }
.summary-block { margin-bottom:24px; }
.summary-label { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; display:inline-flex; align-items:center; gap:6px; }
.summary-body { font-size:13px; line-height:1.72; color:var(--tx); }
.summary-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.summary-list li { display:flex; gap:10px; align-items:flex-start; font-size:12.8px; line-height:1.6; color:var(--t2); }
.summary-list li .bullet { width:5px; height:5px; border-radius:50%; margin-top:7px; flex-shrink:0; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:56px 32px; gap:12px; color:var(--t3); text-align:center; height:100%; }
.empty-state .title { font-size:14px; color:var(--tx); font-weight:550; }
.empty-state .sub { font-size:12.5px; line-height:1.55; max-width:340px; }

.chat-wrap { display:flex; flex-direction:column; height:100%; background:var(--bg); }
.chat-body { flex:1; overflow:auto; padding:18px 18px 6px; display:flex; flex-direction:column; gap:22px; -webkit-mask-image:linear-gradient(to bottom,#000 calc(100% - 18px),transparent); mask-image:linear-gradient(to bottom,#000 calc(100% - 18px),transparent); }
.bubble { display:flex; gap:11px; }
.bubble.user { justify-content:flex-end; }
.bubble.user .avatar { display:none; }
.bubble.user .content { background:var(--s3); border:none; border-radius:18px; padding:10px 15px; font-size:14.5px; line-height:1.58; color:var(--tx); max-width:85%; letter-spacing:-0.008em; }
.bubble.assistant { align-items:flex-start; }
.bubble .avatar { width:27px; height:27px; border-radius:50%; background:#fff; border:1px solid var(--b1); color:var(--read); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; box-shadow:0 1px 2px rgba(0,0,0,0.045); }
.bubble.assistant .content { flex:1; min-width:0; font-size:14.5px; line-height:1.7; color:#19191c; padding-top:3px; letter-spacing:-0.003em; }
.cite { display:inline-flex; align-items:center; gap:6px; font-size:11.5px; padding:3px 9px; margin:9px 6px 0 0; background:var(--s1); border:1px solid var(--b1); border-radius:20px; color:var(--t2); cursor:pointer; transition:background 120ms, border-color 120ms; }
.cite:hover { background:var(--s2); border-color:var(--b2); color:var(--tx); }
.cite .dot { width:5px; height:5px; border-radius:50%; background:var(--read); }
.chat-input { background:transparent; padding:4px 14px 13px; flex-shrink:0; }
.chat-box { background:var(--s1); border:1px solid var(--b1); border-radius:22px; padding:5px; box-shadow:0 2px 14px rgba(20,20,30,0.05); transition:border-color 130ms, box-shadow 130ms; }
.chat-box:focus-within { border-color:var(--b2); box-shadow:0 3px 18px rgba(20,20,30,0.085); }
.chat-attach { display:flex; flex-wrap:wrap; gap:6px; padding:7px 8px 2px; }
.chip { font-size:11px; padding:3px 6px 3px 9px; background:var(--s2); color:var(--t2); border:1px solid var(--b1); border-radius:9px; display:inline-flex; align-items:center; gap:5px; }
.chip .x { cursor:pointer; color:var(--t4); display:inline-flex; border-radius:50%; }
.chip .x:hover { color:var(--t2); background:var(--b1); }
.chat-box textarea { display:block; width:100%; resize:none; border:none; outline:none; font-family:inherit; font-size:14.5px; color:var(--tx); background:transparent; line-height:1.55; max-height:150px; padding:9px 12px 4px; letter-spacing:-0.006em; }
.chat-box textarea::placeholder { color:var(--t4); }
.chat-irow { display:flex; align-items:center; gap:7px; padding:3px 5px 4px; }
.chat-tool { height:31px; border-radius:16px; border:1px solid var(--b1); background:var(--s1); padding:0 11px; font-size:12px; color:var(--t2); cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.chat-tool:hover { background:var(--s2); border-color:var(--b2); }
.chat-tool.icon { width:31px; padding:0; justify-content:center; }
.chat-send { width:33px; height:33px; border-radius:50%; background:#18181b; color:#fff; border:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.chat-send:hover { background:#000; }
.chat-disc { text-align:center; font-size:11px; color:var(--t4); margin-top:8px; }

.notes-wrap { padding:14px 16px; display:flex; flex-direction:column; gap:10px; }
.note-card { background:var(--s1); border:1px solid var(--b1); border-radius:7px; padding:10px 12px; display:flex; flex-direction:column; gap:7px; }
.note-head { display:flex; align-items:center; gap:6px; }
.note-head .pg { margin-left:auto; font-size:10.5px; color:var(--t3); font-family:'JetBrains Mono',monospace; }
.note-quote { font-size:11.8px; color:var(--t2); line-height:1.55; padding:6px 10px; background:var(--s2); border-left:2px solid var(--b2); border-radius:3px; font-style:italic; }
.note-memo { font-size:12.5px; line-height:1.55; color:var(--tx); }
.note-actions { display:flex; gap:4px; margin-top:2px; }

.assets-wrap { padding:14px 16px; }
.assets-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:12px; flex-wrap:wrap; }
.asset-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
.asset-card { border:1px solid var(--b1); border-radius:7px; background:var(--s1); overflow:hidden; cursor:pointer; transition:border-color 120ms; }
.asset-card:hover { border-color:var(--b2); }
.asset-thumb { aspect-ratio:4/3; background:var(--s2); border-bottom:1px solid var(--b1); display:flex; align-items:center; justify-content:center; color:var(--t4); position:relative; overflow:hidden; }
.asset-meta { padding:7px 10px; }
.asset-kind { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.asset-caption { font-size:11.5px; color:var(--tx); line-height:1.4; margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.asset-pg { font-size:10px; color:var(--t4); font-family:'JetBrains Mono',monospace; margin-top:2px; }

/* ============ Tab scaffold (Lab / Wiki / Agent — honest 'next' state) ============ */
.scaffold { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:0; padding:40px; background:var(--bg); animation:fadeUp 160ms ease-out; }
.scaffold .ic { width:54px; height:54px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:16px; }
.scaffold h2 { font-size:19px; font-weight:600; letter-spacing:-0.02em; }
.scaffold .sub { font-size:13px; color:var(--t2); line-height:1.6; max-width:440px; text-align:center; margin-top:8px; }
.scaffold .plan { margin-top:22px; width:100%; max-width:520px; border:1px solid var(--b1); border-radius:9px; background:var(--s1); overflow:hidden; }
.scaffold .plan .ph { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.08em; padding:11px 14px 8px; }
.scaffold .plan .pr { display:flex; align-items:flex-start; gap:10px; padding:9px 14px; border-top:1px solid var(--b1); font-size:12.5px; color:var(--t2); }
.scaffold .plan .pr b { color:var(--tx); font-weight:550; }
.scaffold .plan .pr .ri { margin-top:1px; flex-shrink:0; }
.scaffold .note { margin-top:16px; font-size:11.5px; color:var(--t3); display:inline-flex; align-items:center; gap:6px; }

/* ============ Wiki tab ============ */
.float-panel.wk .outline-item .wt { flex:1; font-size:12.5px; color:var(--t2); line-height:1.35; }
.float-panel.wk .outline-item.active { background:rgba(94,156,111,0.07); border-left-color:var(--search); }
.float-panel.wk .outline-item.active .wt { color:var(--tx); font-weight:550; }

.graph-host { position:relative; height:100%; overflow:hidden; background-color:#faf9f7; background-image:radial-gradient(circle, rgba(15,15,15,0.05) 1px, transparent 1px); background-size:22px 22px; }
.gsvg { position:absolute; inset:0; width:100%; height:100%; }
.gn { position:absolute; transform:translate(-50%,-50%); display:inline-flex; align-items:center; gap:7px; padding:6px 11px; border:1px solid var(--b1); border-radius:8px; background:var(--s1); color:var(--tx); font-size:12px; font-weight:500; white-space:nowrap; box-shadow:0 2px 8px rgba(15,15,15,0.08); cursor:pointer; transition:box-shadow 120ms ease, border-color 120ms ease; }
.gn:hover { border-color:var(--b2); }
.gn::before { content:''; width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.gn.concept::before { background:var(--search); }
.gn.system::before  { background:var(--read); }
.gn.bench::before   { background:var(--result); }
.gn.method::before  { background:var(--research); }
.gn.failure::before { background:var(--insight); }
.gn.big { font-size:13px; font-weight:600; padding:8px 13px; }
.gn.sel { border-color:var(--search); box-shadow:0 0 0 3px rgba(94,156,111,0.18), 0 4px 14px rgba(15,15,15,0.1); }
.gn.dim { opacity:0.5; box-shadow:none; }
.glegend { position:absolute; left:14px; bottom:14px; background:rgba(255,255,255,0.92); backdrop-filter:blur(6px); border:1px solid var(--b1); border-radius:9px; padding:9px 12px; display:grid; gap:5px; box-shadow:0 4px 14px rgba(15,15,15,0.08); }
.glegend b { font-size:9.5px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.08em; }
.glegend .li { display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--t2); }

.wlist-head { display:grid; grid-template-columns:1fr 96px 60px 60px; gap:12px; padding:9px 18px; border-bottom:1px solid var(--b1); font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.06em; background:var(--s1); position:sticky; top:0; }
.wlrow { display:grid; grid-template-columns:1fr 96px 60px 60px; gap:12px; align-items:center; padding:10px 18px; border-bottom:1px solid var(--b1); cursor:pointer; }
.wlrow:hover { background:var(--s2); }
.wlrow.sel { background:rgba(94,156,111,0.06); }
.wlrow .nm { display:flex; align-items:center; gap:9px; font-size:13px; color:var(--tx); }
.wlrow .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wlrow .ty { font-size:11.5px; color:var(--t3); }
.wlrow .ct { font-size:12px; color:var(--t3); font-family:'JetBrains Mono',monospace; text-align:right; }

.wgrid { padding:16px 18px; display:grid; grid-template-columns:repeat(2,1fr); gap:10px; align-content:start; }
.wgcard { border:1px solid var(--b1); border-radius:8px; background:var(--s1); padding:12px 14px; cursor:pointer; transition:border-color 120ms ease; }
.wgcard:hover { border-color:var(--b2); }
.wgcard.sel { border-color:var(--search); box-shadow:0 0 0 2px rgba(94,156,111,0.16); }
.wgcard .nm { display:flex; align-items:center; gap:8px; font-size:13px; font-weight:550; color:var(--tx); }
.wgcard .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wgcard .sm { font-size:11.5px; color:var(--t3); line-height:1.5; margin-top:6px; }
.wgcard .mt { margin-top:9px; font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; }

.wdoc-hdr { gap:8px; }
.wdoc-title { display:flex; align-items:center; gap:8px; min-width:0; }
.wdoc-title b { font-size:13px; font-weight:600; color:var(--tx); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.ttag { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:var(--search); background:rgba(94,156,111,0.1); border:1px solid rgba(94,156,111,0.26); border-radius:4px; padding:1px 6px; flex-shrink:0; }
.wdoc-prose { padding:15px 18px; border-bottom:1px solid var(--b1); }
.wdoc-prose p { font-size:13px; line-height:1.72; color:var(--t2); margin-bottom:10px; }
.wdoc-prose p:last-child { margin-bottom:0; }
.wdoc-prose b { color:var(--tx); font-weight:600; }
.wdoc-prose i { font-family:'JetBrains Mono',monospace; font-style:normal; font-size:12px; color:var(--t2); }
.wdoc-prose a { color:var(--search); border-bottom:1px solid rgba(94,156,111,0.4); cursor:pointer; }
.wsec { padding:14px 18px; border-bottom:1px solid var(--b1); }
.wsec-h { display:flex; align-items:center; gap:8px; font-size:10.5px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:10px; }
.wsec-h span { margin-left:auto; color:var(--t4); font-family:'JetBrains Mono',monospace; letter-spacing:0; }
.warow { display:grid; grid-template-columns:1fr auto auto; gap:10px; align-items:center; padding:8px 0; border-top:1px solid var(--b1); cursor:pointer; }
.warow:first-of-type { border-top:none; }
.warow:hover .wt { color:var(--read); }
.warow .wt { font-size:12.5px; color:var(--t2); line-height:1.35; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.warow .wp { font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; }
.warow .we { color:var(--t4); display:flex; }
.wrel { display:flex; align-items:center; gap:9px; padding:7px 0; border-top:1px solid var(--b1); cursor:pointer; }
.wrel:first-of-type { border-top:none; }
.wrel:hover .rn { color:var(--read); }
.wrel .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.wrel .rn { font-size:12.5px; color:var(--t2); flex:1; }
.wrel .rc { font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; }
.wdoc-foot { padding:13px 18px; display:flex; gap:8px; }
.wdoc-foot .btn-s { flex:1; justify-content:center; }

/* Wiki 2-pane explorer */
.explorer-bar { display:flex; align-items:center; gap:8px; padding:8px 12px; border-bottom:1px solid var(--b1); background:var(--s1); flex-wrap:wrap; }
.explorer-search { display:flex; align-items:center; gap:7px; height:30px; padding:0 9px; border:1px solid var(--b1); border-radius:6px; background:var(--s1); color:var(--t3); flex:1; min-width:150px; }
.explorer-search input { border:none; outline:none; background:transparent; font-size:12.5px; color:var(--tx); flex:1; font-family:inherit; }
.chips { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
.chipf { display:inline-flex; align-items:center; gap:6px; height:26px; padding:0 10px; border:1px solid var(--b1); border-radius:999px; background:var(--s1); color:var(--t2); font-size:12px; font-weight:500; cursor:pointer; transition:background 120ms ease, border-color 120ms ease; }
.chipf:hover { background:var(--s2); border-color:var(--b2); }
.chipf.on { background:var(--tx); color:#fff; border-color:var(--tx); }
.chipf .cdot { width:6px; height:6px; border-radius:50%; }
.chipf .cn { font-family:'JetBrains Mono',monospace; font-size:10.5px; opacity:0.66; }
.gsvg2 { position:absolute; inset:0; width:100%; height:100%; }
.gsvg2 text { font-family:'Inter',sans-serif; letter-spacing:-0.01em; user-select:none; }
.chipf svg { color:var(--t3); }
.chipf.on svg { color:#fff; }

/* List = folder tree */
.tree { padding:6px 8px 18px; }
.tree-row { display:flex; align-items:center; gap:8px; height:30px; padding-right:10px; border-radius:6px; cursor:pointer; }
.tree-row:hover { background:rgba(0,0,0,0.03); }
.tree-row.folder svg { color:var(--t3); flex-shrink:0; }
.tree-row.folder .tname { font-size:13px; font-weight:550; color:var(--t2); }
.tree-row .tcount { margin-left:auto; font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; }
.tree-row.doc .tdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin:0 4px 0 3px; }
.tree-row.doc .tname { font-size:13px; color:var(--tx); }
.tree-row.doc.sel { background:rgba(94,156,111,0.08); }
.tree-row.doc.sel .tname { color:var(--search); font-weight:550; }
.tree-row.doc .ttype { margin-left:auto; font-size:11px; color:var(--t4); }

/* Grid = drill-down folders + masonry waterfall */
.wgrid3 { padding:12px 18px 28px; }
.wcrumb { display:flex; align-items:center; gap:4px; margin-bottom:14px; flex-wrap:wrap; }
.wcb { display:inline-flex; align-items:center; gap:6px; height:28px; padding:0 9px; border:none; background:transparent; border-radius:6px; color:var(--t2); font-size:13px; font-weight:500; cursor:pointer; font-family:inherit; }
.wcb:hover { background:var(--s2); }
.wcb.cur { color:var(--tx); font-weight:600; background:var(--s3); }
.wcb svg { color:var(--t3); }
.wup { margin-left:auto; display:inline-flex; align-items:center; gap:6px; height:28px; padding:0 11px; border:1px solid var(--b1); border-radius:6px; background:var(--s1); color:var(--t2); font-size:12.5px; font-weight:500; cursor:pointer; font-family:inherit; }
.wup:hover { background:var(--s2); border-color:var(--b2); }

.wfolders { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:16px; }
.wfcard { display:flex; align-items:center; gap:11px; padding:12px 14px; border:1px solid var(--b1); border-radius:10px; background:var(--s1); cursor:pointer; text-align:left; font-family:inherit; }
.wfcard:hover { background:var(--s2); border-color:var(--b2); }
.wfic { display:flex; align-items:center; justify-content:center; width:34px; height:34px; border-radius:9px; background:var(--s3); color:var(--t2); flex-shrink:0; }
.wfn { font-size:13.5px; font-weight:600; color:var(--tx); }
.wfm { margin-left:auto; font-size:11.5px; color:var(--t3); white-space:nowrap; }
.wfcard > svg:last-child { flex-shrink:0; color:var(--t4); }

.masonry { column-count:2; column-gap:12px; }
.mcard { break-inside:avoid; -webkit-column-break-inside:avoid; margin-bottom:12px; padding:13px 15px; border:1px solid var(--b1); border-radius:10px; background:var(--s1); cursor:pointer; }
.mcard:hover { border-color:var(--b2); background:var(--s2); }
.mcard.sel { border-color:var(--search); box-shadow:0 0 0 2px rgba(94,156,111,0.16); }
.mhead { display:flex; align-items:flex-start; gap:9px; font-size:14px; font-weight:600; color:var(--tx); line-height:1.32; }
.mhead .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; margin-top:6px; }
.mdesc { margin-top:8px; font-size:12.5px; line-height:1.6; color:var(--t2); }
.mmeta { display:flex; align-items:center; gap:6px; margin-top:11px; font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; }
.mmeta .mx { color:var(--t4); }
.wempty { padding:40px; text-align:center; color:var(--t3); font-size:13px; }

.wiki-back { display:none; }

/* Notion-grade document viewer */
.ndoc { flex:1; min-height:0; display:flex; flex-direction:column; background:var(--bg); }
.ndoc-top { display:flex; align-items:center; gap:8px; height:42px; flex-shrink:0; padding:0 10px 0 14px; border-bottom:1px solid var(--b1); background:var(--s1); }
.ndoc-crumb { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--t3); flex:1; min-width:0; }
.ndoc-crumb .cdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
.ndoc-crumb b { color:var(--t2); font-weight:500; }
.ndoc-body { flex:1; overflow:auto; }
.ndoc-page { max-width:720px; margin:0 auto; padding:34px 52px 64px; }
.npage-icon { width:46px; height:46px; border-radius:11px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
.ntitle { font-size:29px; font-weight:700; letter-spacing:-0.022em; line-height:1.18; color:var(--tx); margin-bottom:14px; }

.nprops { display:grid; gap:1px; margin-bottom:6px; }
.nprop { display:grid; grid-template-columns:148px 1fr; gap:10px; align-items:center; min-height:30px; padding:4px 8px; border-radius:6px; }
.nprop:hover { background:var(--s2); }
.nprop .k { display:inline-flex; align-items:center; gap:9px; color:var(--t3); font-size:13px; }
.nprop .k svg { color:var(--t4); flex-shrink:0; }
.nprop .v { font-size:13.5px; color:var(--tx); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.nprop .v.mut { color:var(--t2); }
.npill { display:inline-flex; align-items:center; gap:6px; height:23px; padding:0 9px; border-radius:5px; font-size:12px; font-weight:550; }
.ntag { display:inline-flex; align-items:center; height:21px; padding:0 8px; border-radius:5px; background:var(--s3); color:var(--t2); font-size:12px; }
.ndiv { height:1px; background:var(--b1); margin:15px 0; }

.nbody { color:#322f2b; }
.nbody p { font-size:15px; line-height:1.66; margin:2px 0 11px; }
.nbody b, .nbody strong { color:var(--tx); font-weight:650; }
.nbody h2 { font-size:18.5px; font-weight:650; letter-spacing:-0.012em; color:var(--tx); margin:24px 0 7px; }
.nbody h3 { font-size:15px; font-weight:650; color:var(--tx); margin:16px 0 3px; }
.nbody a { color:var(--read); border-bottom:1px solid rgba(94,106,210,0.35); cursor:pointer; }
.nbody a.wk { color:var(--search); border-bottom-color:rgba(94,156,111,0.4); }
.nbody ul { margin:6px 0 12px; padding:0; list-style:none; }
.nbody li { position:relative; padding-left:21px; font-size:15px; line-height:1.62; color:#322f2b; margin:5px 0; }
.nbody li::before { content:'•'; position:absolute; left:6px; top:-1px; color:var(--t3); }
.ncode { font-family:'JetBrains Mono',monospace; font-size:12.5px; background:rgba(94,106,210,0.09); color:var(--read); padding:1px 6px; border-radius:4px; box-decoration-break:clone; -webkit-box-decoration-break:clone; }
.ncallout { display:flex; gap:11px; padding:13px 15px; background:var(--s2); border:1px solid var(--b1); border-radius:9px; margin:12px 0; }
.ncallout .ic { font-size:17px; line-height:1.5; flex-shrink:0; }
.ncallout .tx { font-size:14px; line-height:1.62; color:var(--t2); }
.ncallout .tx b { color:var(--tx); }
.neq { background:var(--s2); border:1px solid var(--b1); border-radius:9px; padding:15px; text-align:center; font-family:'JetBrains Mono',monospace; font-size:13.5px; color:var(--tx); margin:12px 0; }

.nrefs { margin-top:30px; }
.nrefs-sec + .nrefs-sec { margin-top:22px; }
.nrefs-h { display:flex; align-items:center; gap:8px; font-size:12px; font-weight:600; color:var(--t2); margin-bottom:11px; }
.nrefs-h svg { color:var(--t3); }
.nrefs-h .n { color:var(--t4); font-family:'JetBrains Mono',monospace; }
.nlinkchips { display:flex; flex-wrap:wrap; gap:7px; }
.nlinkchip { display:inline-flex; align-items:center; gap:7px; height:30px; padding:0 11px; border:1px solid var(--b1); border-radius:7px; background:var(--s1); font-size:13px; color:var(--tx); cursor:pointer; font-family:inherit; }
.nlinkchip:hover { background:var(--s2); border-color:var(--b2); }
.nlinkchip .dot { width:7px; height:7px; border-radius:50%; }
.nref { display:grid; grid-template-columns:30px 1fr auto; gap:11px; align-items:center; padding:9px 12px; border:1px solid var(--b1); border-radius:9px; margin-bottom:8px; cursor:pointer; }
.nref:hover { background:var(--s2); border-color:var(--b2); }
.nref .ric { width:30px; height:30px; border-radius:7px; display:flex; align-items:center; justify-content:center; }
.nref .rb strong { display:block; font-size:13px; font-weight:600; color:var(--tx); line-height:1.3; }
.nref .rb span { display:block; margin-top:2px; font-size:12px; color:var(--t3); line-height:1.4; }
.nref .rm { font-size:11px; color:var(--t4); font-family:'JetBrains Mono',monospace; white-space:nowrap; }

/* ============ Reading · Library view ============ */

/* reasoning trace — quiet disclosure */

          <div className="abs-h">Abstract</div>
          <p>Retrieval-augmented generation (RAG) pipelines typically apply a neural reranker to every retrieved passage list, regardless of the retriever's confidence. We show that this full-reranking policy is wasteful on a non-trivial fraction of queries.</p>
          <p>We propose <b>Adaptive Skipping</b>, a lightweight cascade mechanism that uses a confidence score to selectively bypass the reranker. On BEIR, our method achieves <span className="mk r">44.8 nDCG@10 on average while reducing reranker calls by 58%</span> and end-to-end latency by 40%.</p>

function ReadingTab({ readSub, setReadSub }) {
  const [view, setView] = useState('library');
  const [paperId, setPaperId] = useState('p1');
  const [docTab, setDocTab] = useState('pdf');
  const [wbTab, setWbTab] = useState('chat');
  const [splitH, setSplitH] = useState(62);
  const [splitV, setSplitV] = useState(62);
  const [analyzed, setAnalyzed] = useState(true);
  const [wbCollapsed, setWbCollapsed] = useState(false);
  const [orient, setOrient] = useState('horizontal');
  const paper = LIBRARY.find(p => p.id===paperId) || LIBRARY[0];
  const openReader = (id) => { setPaperId(id); setView('reader'); };
  const drag = useRef(null);

  const onDown = (e) => { drag.current = { startX:e.clientX, startY:e.clientY, startSplit: orient==='horizontal' ? splitH : splitV }; };
  useEffect(() => {
    const onMove = (e) => {
      if (!drag.current) return;
      if (orient==='horizontal') {
        const left = 56 + 288;
        const wbStrip = wbCollapsed ? 42 : 0;
        const delta = e.clientX - drag.current.startX;

/* Obsidian-style force graph that reflects the folder structure
   (folder nodes + doc nodes; containment edges cluster docs per folder, semantic links dashed) */
function GraphView({ sel, setSel, cat, onPick }) {
  const W = 960, H = 660;
  const svgRef = useRef(null);
  const P = useRef(null);
  const alpha = useRef(1);
  const dragId = useRef(null);
  const [hover, setHover] = useState(null);
  const [, force] = useState(0);

  if (!P.current) {
    P.current = {};
    GNODE_IDS.forEach((id,i) => {
      const ang = (i / GNODE_IDS.length) * Math.PI * 2;
      P.current[id] = { x:W/2 + Math.cos(ang)*240 + (Math.random()*30-15), y:H/2 + Math.sin(ang)*170 + (Math.random()*30-15), vx:0, vy:0 };
    });
  }

  useEffect(() => {
    const ids = GNODE_IDS; let raf;
    const tick = () => {
      const p = P.current, a = alpha.current;
      if (a > 0.004) {
        for (let i=0;i<ids.length;i++) for (let j=i+1;j<ids.length;j++) {
          const A=p[ids[i]], B=p[ids[j]];
          let dx=A.x-B.x, dy=A.y-B.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2);
          const f=3200/d2, fx=dx/d*f, fy=dy/d*f;
          A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy;
        }
        CONT_EDGES.forEach(([s,t]) => { const A=p[s], B=p[t]; let dx=B.x-A.x, dy=B.y-A.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
          const f=(d-92)*0.022, fx=dx/d*f, fy=dy/d*f; A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy; });
        G_LINKS.forEach(([s,t]) => { const A=p[s], B=p[t]; let dx=B.x-A.x, dy=B.y-A.y, d=Math.sqrt(dx*dx+dy*dy)||0.01;
          const f=(d-175)*0.006, fx=dx/d*f, fy=dy/d*f; A.vx+=fx; A.vy+=fy; B.vx-=fx; B.vy-=fy; });
        ids.forEach(id => { const n=p[id];
          n.vx += (W/2-n.x)*0.013; n.vy += (H/2-n.y)*0.013; n.vx*=0.85; n.vy*=0.85;
          if (dragId.current !== id) { n.x += n.vx*a*0.9; n.y += n.vy*a*0.9; } });
        alpha.current = a*0.986; force(v => v+1);
      }
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, []);

  const toSvg = (e) => { const svg=svgRef.current; const pt=svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY; return pt.matrixTransform(svg.getScreenCTM().inverse()); };
  const onMove = (e) => { if (!dragId.current) return; const r=toSvg(e); const n=P.current[dragId.current]; n.x=r.x; n.y=r.y; n.vx=0; n.vy=0; alpha.current=Math.max(alpha.current,0.4); force(v=>v+1); };
  const endDrag = () => { dragId.current=null; };

  const focus = hover;
  const topOf = (id) => NODE_KIND[id]==='folder' ? (() => { let f=FOLDER_BY_ID[id]; while (f.parent) f=FOLDER_BY_ID[f.parent]; return f.id; })() : topFolderOf(id);
  const dimNode = (id) => cat && cat!=='all' && topOf(id)!==cat;

  return (

function XpChart() {
  const W=348, H=176, x0=34, x1=338, yb=136, yt=16, maxV=3;
  const sx=(x1-x0)/XP_DOMAINS.length, sy=(yb-yt)/maxV;
  const R=T.research;
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{ display:'block' }}>
      {[0,1,2,3].map(v => { const y=yb-v*sy; return (
        <g key={v}>
          <line x1={x0} y1={y} x2={x1} y2={y} stroke={v===0?T.b2:T.b1} strokeWidth={v===0?1:0.8} strokeDasharray={v===0?'':'2 3'}/>
          <text x={x0-7} y={y+3} textAnchor="end" fontSize="8" fill={T.t4} fontFamily="'JetBrains Mono',monospace">+{v}</text>
        </g>
      ); })}
      {XP_DOMAINS.map((d,i) => {
        const gx=x0+i*sx+sx/2, oursV=d.ours-d.fixed, oraV=d.oracle-d.fixed, bw=13;
        const ho=oursV*sy, hc=oraV*sy;
        return (
          <g key={d.d}>
            <rect x={gx+1} y={yb-hc} width={bw} height={hc} rx="2.5" style={{ fill:'rgba(137,87,201,0.13)', stroke:'rgba(137,87,201,0.4)', strokeWidth:0.8 }}/>
            <rect x={gx-bw-1} y={yb-ho} width={bw} height={ho} rx="2.5" style={{ fill:R }}/>
            <text x={gx-bw/2-1} y={yb-ho-4} textAnchor="middle" fontSize="7.5" fontWeight="600" fill={R} fontFamily="'JetBrains Mono',monospace">+{oursV.toFixed(1)}</text>
            <text x={gx} y={yb+12} textAnchor="middle" fontSize="8" fill={T.t3}>{d.d}</text>
          </g>
        );
      })}
    </svg>
  );
}

  const drag = useRef(null);
  const onDown = (e) => { drag.current = { x:e.clientX, s:splitH }; };
  useEffect(() => {
    const mv = (e) => { if (!drag.current) return; const total = window.innerWidth - 56 - 288 - 5;
      setSplitH(Math.max(38, Math.min(72, drag.current.s + ((e.clientX - drag.current.x)/total)*100))); };
    const up = () => drag.current = null;
    window.addEventListener('mousemove', mv); window.addEventListener('mouseup', up);
    return () => { window.removeEventListener('mousemove', mv); window.removeEventListener('mouseup', up); };
  }, []);
  const openProject = (id) => { setProj(id); setView('board'); };
  const openExp = (id) => { setSel(id); setView('workspace'); };
  const P = PROJ_BY_ID[proj];
  return (
    <>
      <div className="metabar">
        <div className="crumb-group"><Icon name="flask" size={13} color={T.research}/><span style={{ color:T.research, fontWeight:550 }}>Lab</span></div>
        {view!=='projects' && (
          <button className="btn-ghost" style={{ marginRight:2 }} onClick={() => setView(view==='workspace'?'board':'projects')}>
            <Icon name="chevL" size={14}/> {view==='workspace' ? P.name : '프로젝트'}
          </button>
        )}
        <div style={{ display:'flex', flexDirection:'column', minWidth:0 }}>
          {view==='projects' && <>
            <div className="title">프로젝트</div>
            <div className="byline"><span>{PROJECTS.length}개 프로젝트</span><span style={{ color:T.t4 }}>·</span><span>가설 · 실험 · 리포트 워크스페이스</span></div>
          </>}
          {view==='board' && <>
            <div className="title">{P.name}</div>
            <div className="byline"><span>{P.docs} docs</span><span style={{ color:T.t4 }}>·</span><span>{projExps(proj).length} experiments</span><span style={{ color:T.t4 }}>·</span><span>{P.arts} artifacts</span></div>
          </>}
          {view==='workspace' && <>
            <div className="title">auto-τ regression</div>
            <div className="byline"><span style={{ color:P.color }}>{P.name}</span><span style={{ color:T.t4 }}>·</span><span style={{ color:T.search, display:'inline-flex', alignItems:'center', gap:4 }}><Icon name="check" size={11}/> 보고 완료 · 지지됨</span></div>
          </>}
        </div>
        <div className="meta-actions">
          {view!=='projects' && (
            <div className="seg">
              <button className={view==='board'?'on':''} onClick={() => setView('board')}><Icon name="columns" size={13}/> 보드</button>
              <button className={view==='workspace'?'on':''} onClick={() => setView('workspace')}><Icon name="flask" size={13}/> 워크스페이스</button>
            </div>
          )}
          <button className="btn-s"><Icon name="plus" size={13}/> {view==='projects' ? '새 프로젝트' : '새 실험'}</button>
          <div style={{ width:1, height:20, background:T.b1, margin:'0 4px' }}/>
          <button className="btn-ghost"><Icon name="share" size={14}/></button>
          <button className="btn-ghost"><Icon name="moreH" size={14}/></button>
        </div>
      </div>
      {view==='projects' && <div className="main"><ProjectGrid onOpen={openProject}/></div>}
      {view==='board' && <div className="main"><ProjectPanel proj={proj}/><LabBoard proj={proj} sel={sel} onOpen={openExp}/></div>}
      {view==='workspace' && (
        <div className="main">
          <LabPanel proj={proj} sel={sel} onOpen={setSel}/>
          <div className="split">
            <RunnerConsolePane basis={`0 0 calc(${splitH}% - 2.5px)`}/>
            <div className="resize h" onMouseDown={onDown}/>
            <ReportPane basis={`0 0 calc(${100-splitH}% - 2.5px)`}/>
          </div>
        </div>
      )}
    </>
  );
}

/* ============ Shell: product rail (full height) + metabar/content column ============ */
function Shell() {
  const [tab, setTab] = useState('reading');
  const [readSub, setReadSub] = useState('overview');
  return (
    <div className="app" style={{ flexDirection:'row' }}>
      <ProductRail tab={tab} setTab={setTab}/>
      <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>
        {tab==='reading' && <ReadingTab readSub={readSub} setReadSub={setReadSub}/>}
        {tab==='wiki' && <WikiTab/>}
        {tab==='agent' && <AgentTab/>}
        {tab==='lab' && <LabTab/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Shell/>);
</script>
</body>
</html>
