<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES — Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fbfbfa;
  --sb: #f5f5f4;
  --s1: #ffffff;
  --s2: #f7f7f6;
  --s3: #f0efed;
  --b1: #e8e8e6;
  --b2: #d4d4d2;
  --tx: #0a0a0b;
  --t2: #4a4a50;
  --t3: #8a8a92;
  --t4: #b0b0b8;
  --accent: #5e6ad2;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  background: var(--bg);
  color: var(--tx);
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  letter-spacing: -0.006em;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d8d7d3; border-radius: 3px; border: 1px solid transparent; }
::-webkit-scrollbar-thumb:hover { background: #b8b7b3; }
::-webkit-scrollbar-track { background: transparent; }

.hov:hover { background: rgba(0,0,0,0.035) !important; }
.hov-soft:hover { background: rgba(0,0,0,0.02) !important; }
.hov-card:hover { background: var(--s2) !important; border-color: #dcdbd8 !important; }
.hov-row:hover { background: rgba(0,0,0,0.025) !important; }
.kbd {
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--t3);
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 3px;
  padding: 0 5px;
  min-width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0;
}
button { font-family: inherit; }
.btn-p { background: #18181b; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-p:hover { background: #26262b; }
.btn-s { background: var(--s1); color: var(--tx); border: 1px solid var(--b1); border-radius: 6px; padding: 5px 11px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-s:hover { background: var(--s2); border-color: var(--b2); }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500;
  padding: 1px 7px; border-radius: 4px;
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--b1);
  white-space: nowrap;
  letter-spacing: -0.003em;
}
/* Design system page layout */
.ds-root { max-width: 1180px; margin: 0 auto; padding: 40px 32px 120px; }
.ds-topnav {
  position: sticky; top: 0; z-index: 10;
  background: rgba(251,251,250,0.88);
  backdrop-filter: saturate(1.4) blur(8px);
  -webkit-backdrop-filter: saturate(1.4) blur(8px);
  border-bottom: 1px solid var(--b1);
}
.ds-topnav-inner { max-width: 1180px; margin: 0 auto; padding: 10px 32px; display: flex; align-items: center; gap: 18px; overflow-x: auto; }
.ds-topnav a { font-size: 12px; color: var(--t2); text-decoration: none; white-space: nowrap; letter-spacing: -0.005em; padding: 4px 6px; border-radius: 5px; }
.ds-topnav a:hover { background: rgba(0,0,0,0.04); color: var(--tx); }
.ds-section { margin-top: 64px; scroll-margin-top: 60px; }
.ds-section:first-of-type { margin-top: 32px; }
.ds-eyebrow { font-size: 10.5px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 8px; }
.ds-h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 12px; }
.ds-h2 { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
.ds-sub { font-size: 13px; color: var(--t2); line-height: 1.6; max-width: 720px; }
.ds-rule { height: 1px; background: var(--b1); margin: 24px 0; }
.ds-subgrid { display: grid; grid-template-columns: 180px 1fr; gap: 20px; margin-top: 20px; }
.ds-subgrid .label { font-size: 10.5px; font-weight: 600; color: var(--t3); text-transform: uppercase; letter-spacing: 0.08em; padding-top: 4px; }
.ds-card { background: var(--s1); border: 1px solid var(--b1); border-radius: 8px; padding: 18px 20px; }
.ds-mono { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--t2); letter-spacing: 0; }
.ds-grid-cols-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.ds-grid-cols-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.ds-grid-cols-6 { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; }
.ds-swatch { border: 1px solid var(--b1); border-radius: 7px; overflow: hidden; background: var(--s1); }
.ds-swatch-face { height: 56px; }
.ds-swatch-meta { padding: 8px 10px; display: flex; flex-direction: column; gap: 2px; }
.ds-swatch-name { font-size: 12px; font-weight: 550; letter-spacing: -0.005em; }
.ds-swatch-val { font-family: 'JetBrains Mono', monospace; font-size: 10.5px; color: var(--t3); }
.ds-inline-code { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; background: var(--s2); border: 1px solid var(--b1); border-radius: 4px; padding: 1px 6px; color: var(--t2); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState } = React;

/* ── SHARED TOKENS (mirror of prototype) ───────────────────────── */
const T = {
  bg: '#fbfbfa', sb: '#f5f5f4', s1: '#ffffff', s2: '#f7f7f6', s3: '#f0efed',
  b1: '#e8e8e6', b2: '#d4d4d2', tx: '#0a0a0b', t2: '#4a4a50', t3: '#8a8a92', t4: '#b0b0b8',
  search: '#5e9c6f', read: '#5e6ad2', research: '#8957c9', result: '#c07b3a',
  insight: '#c04e68', writing: '#3aa3a3',
};
const mono = { fontFamily: "'JetBrains Mono', monospace", fontFeatureSettings: 'normal' };

/* ── ICONS (subset of prototype, 1.75 stroke) ─────────────────── */
const Icon = ({ name, size = 16, color = 'currentColor', style = {} }) => {
  const s = size;
  const p = { width: s, height: s, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.75, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  const paths = {
    search: <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
    book: <><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></>,
    flask: <><path d="M9 3h6"/><path d="M10 3v6L4.5 18a2 2 0 001.7 3h11.6a2 2 0 001.7-3L14 9V3"/><path d="M7 15h10"/></>,
    chart: <><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></>,
    sparkles: <><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></>,
    pen: <><path d="M17 3l4 4L7 21H3v-4L17 3z"/></>,
    chevR: <path d="M9 6l6 6-6 6"/>,
    chevD: <path d="M6 9l6 6 6-6"/>,
    plus: <><path d="M12 5v14M5 12h14"/></>,
    filter: <path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3z"/>,
    ext: <><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></>,
    check: <path d="M20 6L9 17l-5-5"/>,
    dot: <circle cx="12" cy="12" r="4" fill={color} stroke="none"/>,
    git: <><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></>,
    arrowR: <><path d="M5 12h14M12 5l7 7-7 7"/></>,
    status_done: <><circle cx="12" cy="12" r="9" fill={color} stroke="none"/><path d="M8 12l3 3 5-6" stroke="#fff"/></>,
    status_run:  <><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2.5"/></>,
    status_todo: <circle cx="12" cy="12" r="9" strokeDasharray="2 3"/>,
    status_queue:<circle cx="12" cy="12" r="9"/>,
    moreH: <><circle cx="6" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="12" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="18" cy="12" r="1.4" fill={color} stroke="none"/></>,
    dl: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></>,
    share: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></>,
  };
  return <svg {...p}>{paths[name]}</svg>;
};

/* ── SHARED ATOMS ──────────────────────────────────────────────── */
const Tag = ({ label, color, dot }) => (
  <span className="tag" style={color ? { background: `${color}12`, color, borderColor: `${color}30` } : {}}>
    {dot && <span style={{ width: 5, height: 5, borderRadius: '50%', background: color || T.t3 }} />}
    {label}
  </span>
);
const Kbd = ({ children }) => <span className="kbd">{children}</span>;
const StatusIcon = ({ status }) => {
  const map = { done: T.search, running: T.result, todo: T.t3, queue: T.t4 };
  const color = map[status] || T.t3;
  if (status === 'done') return <Icon name="status_done" size={14} color={color} />;
  if (status === 'running') return (
    <span style={{ display: 'inline-flex', animation: 'pulse 1.5s infinite' }}>
      <Icon name="status_run" size={14} color={color} />
    </span>
  );
  if (status === 'todo') return <Icon name="status_todo" size={14} color={T.t3} />;
  return <Icon name="status_queue" size={14} color={T.t4} />;
};

/* ── SECTION META ─────────────────────────────────────────────── */
const SECTIONS = [
  { id: 'search',   label: 'Search',   sub: '논문 서치 및 수집',   color: T.search,   icon: 'search'   },
  { id: 'read',     label: 'Reading',  sub: 'AI 논문 리딩',        color: T.read,     icon: 'book'     },
  { id: 'research', label: 'Research', sub: '재현연구 및 실험',    color: T.research, icon: 'flask'    },
  { id: 'results',  label: 'Result',   sub: '결과 도출 및 정리',   color: T.result,   icon: 'chart'    },
  { id: 'insights', label: 'Insight',  sub: '인사이트 취합',       color: T.insight,  icon: 'sparkles' },
  { id: 'writing',  label: 'Writing',  sub: '논문 작성 보조',      color: T.writing,  icon: 'pen'      },
];

/* ── BLOCKS ────────────────────────────────────────────────────── */
const Section = ({ id, eyebrow, title, sub, children }) => (
  <section id={id} className="ds-section">
    <div className="ds-eyebrow">{eyebrow}</div>
    <h2 className="ds-h1">{title}</h2>
    {sub && <p className="ds-sub">{sub}</p>}
    <div className="ds-rule" />
    {children}
  </section>
);
const Sub = ({ label, children }) => (
  <div className="ds-subgrid">
    <div className="label">{label}</div>
    <div>{children}</div>
  </div>
);
const Swatch = ({ name, hex, dark }) => (
  <div className="ds-swatch">
    <div className="ds-swatch-face" style={{ background: hex, borderBottom: `1px solid ${T.b1}` }} />
    <div className="ds-swatch-meta">
      <span className="ds-swatch-name" style={{ color: dark ? T.tx : T.tx }}>{name}</span>
      <span className="ds-swatch-val">{hex.toUpperCase()}</span>
    </div>
  </div>
);
const Row = ({ children, style = {} }) => (
  <div style={{ display: 'flex', flexWrap: 'wrap', alignItems: 'center', gap: 10, ...style }}>{children}</div>
);

/* ── PAGES ─────────────────────────────────────────────────────── */
function FoundationColors() {
  const surface = [
    ['bg',  T.bg,  'Canvas / app background'],
    ['sb',  T.sb,  'Sidebar background'],
    ['s1',  T.s1,  'Card / panel surface'],
    ['s2',  T.s2,  'Hover / muted surface'],
    ['s3',  T.s3,  'Pressed / progress track'],
  ];
  const border = [
    ['b1', T.b1, 'Hairline border (default)'],
    ['b2', T.b2, 'Border (hover / emphasis)'],
  ];
  const text = [
    ['tx', T.tx, 'Primary text'],
    ['t2', T.t2, 'Body / secondary text'],
    ['t3', T.t3, 'Muted / label text'],
    ['t4', T.t4, 'Disabled / placeholder'],
  ];
  const accent = [
    ['search',   T.search,   'Stage 1 · 녹색 · 수집'],
    ['read',     T.read,     'Stage 2 · 인디고 · 리딩 / 기본 액센트'],
    ['research', T.research, 'Stage 3 · 보라 · 재현실험'],
    ['result',   T.result,   'Stage 4 · 주황 · 결과 (= running)'],
    ['insight',  T.insight,  'Stage 5 · 적분홍 · 인사이트'],
    ['writing',  T.writing,  'Stage 6 · 청록 · 작성'],
  ];
  const chipRow = (rows) => (
    <div className="ds-grid-cols-6">
      {rows.map(([n, h, desc]) => (
        <div key={n} className="ds-swatch" title={desc}>
          <div className="ds-swatch-face" style={{ background: h, borderBottom: `1px solid ${T.b1}` }} />
          <div className="ds-swatch-meta">
            <span className="ds-swatch-name">{n}</span>
            <span className="ds-swatch-val">{h.toUpperCase()}</span>
            {desc && <span style={{ fontSize: 10.5, color: T.t3, marginTop: 2 }}>{desc}</span>}
          </div>
        </div>
      ))}
    </div>
  );
  return (
    <Section id="colors" eyebrow="Foundation" title="Color"
      sub="ARES의 팔레트는 Linear/Notion 스타일의 따뜻한 오프화이트를 기반으로 하고, 6단계 워크플로우를 고유의 desaturated 액센트로 구분한다. 각 stage 색은 bg(12%), border(30%) opacity 규칙으로 파생된다.">
      <Sub label="Surface">{chipRow(surface)}</Sub>
      <Sub label="Border">{chipRow(border)}</Sub>
      <Sub label="Text">{chipRow(text)}</Sub>
      <Sub label="Stage accent">{chipRow(accent)}</Sub>
      <Sub label="Derived tints">
        <div className="ds-card">
          <div style={{ fontSize: 12, color: T.t2, marginBottom: 10, lineHeight: 1.7 }}>
            Stage 색은 언제나 <span className="ds-inline-code">{'${color}'}</span> 위에 opacity suffix를 붙여 파생시킨다. 새로운 색상을 임의로 만들지 않는다.
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '120px 1fr 1fr 1fr', gap: 8, alignItems: 'center' }}>
            {[['12%', '0a', '0f', '1a'], ['18%', '18', '2d', '55'], ['25%', '28', '3f', '60']].map(([pct, a, b, c]) => (
              <React.Fragment key={pct}>
                <div style={{ fontSize: 11, color: T.t3, ...mono }}>bg / text ≈ {pct}</div>
                <div style={{ padding: '10px 14px', background: `${T.read}${a}`, color: T.read, borderRadius: 6, fontSize: 12 }}>read · {a}</div>
                <div style={{ padding: '10px 14px', background: `${T.insight}${b}`, color: T.insight, borderRadius: 6, fontSize: 12 }}>insight · {b}</div>
                <div style={{ padding: '10px 14px', background: `${T.writing}${c}`, color: T.writing, borderRadius: 6, fontSize: 12 }}>writing · {c}</div>
              </React.Fragment>
            ))}
          </div>
        </div>
      </Sub>
    </Section>
  );
}

function FoundationType() {
  const scale = [
    ['Display',  30, 600, '-0.03em', 1.0,  '숫자 지표 (재현도/메트릭 카드)'],
    ['H1',       24, 600, '-0.025em', 1.2,  'Writing 화면 타이틀'],
    ['H2',       19, 600, '-0.02em', 1.35, '논문 리딩 타이틀'],
    ['Title',    14, 600, '-0.01em', 1.4,  '카드/섹션 타이틀'],
    ['Strong',   13.5, 550, '-0.01em', 1.4, '리스트 primary'],
    ['Body',     14, 400, '-0.006em', 1.75, '본문 (리딩/작성)'],
    ['UI base',  13, 450, '-0.006em', 1.5, '사이드바/버튼'],
    ['UI small', 12.5, 450, '-0.005em', 1.5, 'secondary 리스트'],
    ['Meta',     11.5, 500, '-0.003em', 1.4, 'author, 칩 내부'],
    ['Label',    11, 600, '0.06em', 1.4,   'uppercase 섹션 라벨'],
    ['Caption',  10.5, 500, '0.08em', 1.3, 'eyebrow / micro'],
  ];
  return (
    <Section id="type" eyebrow="Foundation" title="Typography"
      sub="Inter가 UI 전체를 담당하고, 메트릭과 파라미터는 JetBrains Mono로 조판한다. 모든 sans 텍스트는 feature-settings 'cv11','ss01','ss03'을 강제 적용하여 숫자/알파벳이 일관된 형태를 유지한다.">
      <Sub label="Families">
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
          <div className="ds-card">
            <div className="ds-eyebrow" style={{ marginBottom: 4 }}>Sans</div>
            <div style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.02em' }}>Inter</div>
            <div style={{ fontSize: 12, color: T.t3, marginTop: 4 }}>weights 400 / 450 / 500 / 550 / 600 / 650</div>
            <div style={{ fontSize: 11.5, color: T.t3, marginTop: 4, ...mono }}>cv11 · ss01 · ss03</div>
          </div>
          <div className="ds-card">
            <div className="ds-eyebrow" style={{ marginBottom: 4 }}>Mono</div>
            <div style={{ fontSize: 22, fontWeight: 500, ...mono }}>JetBrains Mono</div>
            <div style={{ fontSize: 12, color: T.t3, marginTop: 4 }}>metrics, params, code, kbd-adjacent values</div>
          </div>
        </div>
      </Sub>
      <Sub label="Scale">
        <div className="ds-card">
          <div style={{ display: 'grid', gridTemplateColumns: '100px 70px 60px 90px 60px 1fr', gap: 12, fontSize: 11, color: T.t3, padding: '4px 0 10px', borderBottom: `1px solid ${T.b1}`, fontWeight: 600, letterSpacing: '0.05em', textTransform: 'uppercase' }}>
            <span>Role</span><span>Size</span><span>Weight</span><span>Tracking</span><span>LH</span><span>Example</span>
          </div>
          {scale.map(([role, size, w, track, lh, ex], i) => (
            <div key={role} style={{ display: 'grid', gridTemplateColumns: '100px 70px 60px 90px 60px 1fr', gap: 12, alignItems: 'baseline', padding: '10px 0', borderBottom: i < scale.length - 1 ? `1px solid ${T.b1}` : 'none' }}>
              <span style={{ fontSize: 12, color: T.t2, fontWeight: 500 }}>{role}</span>
              <span style={{ ...mono, fontSize: 11.5, color: T.t3 }}>{size}px</span>
