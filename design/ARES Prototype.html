<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES — Agentic Research Experimentation System</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fbfbfa;
  --sb: #f5f5f4;
  --s1: #ffffff;
  --s2: #f7f7f6;
  --s3: #f0efed;
  --b1: #e8e8e6;
  --b2: #d4d4d2;
  --tx: #0a0a0b;
  --t2: #4a4a50;
  --t3: #8a8a92;
  --t4: #b0b0b8;
  --accent: #5e6ad2;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  background: var(--bg);
  color: var(--tx);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  letter-spacing: -0.006em;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d8d7d3; border-radius: 3px; border: 1px solid transparent; }
::-webkit-scrollbar-thumb:hover { background: #b8b7b3; }
::-webkit-scrollbar-track { background: transparent; }

.hov:hover { background: rgba(0,0,0,0.035) !important; }
.hov-soft:hover { background: rgba(0,0,0,0.02) !important; }
.hov-card:hover { background: var(--s2) !important; border-color: #dcdbd8 !important; }
.hov-row:hover { background: rgba(0,0,0,0.025) !important; }
.kbd {
  font-family: 'Inter', sans-serif;
  font-size: 10.5px;
  font-weight: 500;
  color: var(--t3);
  background: var(--s1);
  border: 1px solid var(--b1);
  border-radius: 3px;
  padding: 0 5px;
  min-width: 18px;
  height: 18px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0;
}
.workflow-item .workflow-side-actions {
  opacity: 0;
  transition: opacity 120ms ease;
}
.workflow-item:hover .workflow-side-actions,
.workflow-item.is-active .workflow-side-actions {
  opacity: 1;
}
.workflow-toggle {
  width: 100%;
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 8px 8px;
  cursor: pointer;
}
.workflow-toggle:hover {
  color: var(--t2);
}
.sidebar-icon-btn {
  width: 20px;
  height: 20px;
  border: none;
  border-radius: 5px;
  background: transparent;
  color: var(--t3);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background-color 120ms ease, color 120ms ease;
}
.sidebar-icon-btn:hover {
  background: rgba(0,0,0,0.045);
  color: var(--t2);
}
.sidebar-menu {
  position: absolute;
  top: 24px;
  right: 0;
  min-width: 156px;
  padding: 6px;
  border: 1px solid var(--b1);
  border-radius: 8px;
  background: var(--s1);
  box-shadow: 0 8px 24px rgba(15, 15, 15, 0.08), 0 1px 3px rgba(15, 15, 15, 0.06);
  z-index: 20;
}
.sidebar-menu-item {
  width: 100%;
  border: none;
  background: transparent;
  border-radius: 6px;
  padding: 7px 8px;
  color: var(--t2);
  font-size: 12.5px;
  text-align: left;
  display: flex;
  align-items: center;
  cursor: pointer;
}
.sidebar-menu-item:hover {
  background: var(--s2);
  color: var(--tx);
}
.sidebar-menu-divider {
  height: 1px;
  background: var(--b1);
  margin: 6px 2px;
}
button { font-family: inherit; }
.btn-p { background: #18181b; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-p:hover { background: #26262b; }
.btn-s { background: var(--s1); color: var(--tx); border: 1px solid var(--b1); border-radius: 6px; padding: 5px 11px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-s:hover { background: var(--s2); border-color: var(--b2); }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500;
  padding: 1px 7px; border-radius: 4px;
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--b1);
  white-space: nowrap;
  letter-spacing: -0.003em;
}
.bottom-nav { display: none; }
@media (max-width: 768px) {
  .desktop-sidebar { display: none !important; }
  .bottom-nav { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--b1); z-index: 100; padding: 4px 0 6px; }
  .main-wrap { padding-bottom: 64px !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<!-- Icons module -->
<script type="text/babel" data-presets="react">
// Lucide-style outline icons, 16px default
const Icon = ({ name, size = 16, color = 'currentColor', style = {} }) => {
  const s = size;
  const p = { width: s, height: s, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth: 1.75, strokeLinecap: 'round', strokeLinejoin: 'round', style };
  const paths = {
    search: <><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
    book: <><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></>,
    flask: <><path d="M9 3h6"/><path d="M10 3v6L4.5 18a2 2 0 001.7 3h11.6a2 2 0 001.7-3L14 9V3"/><path d="M7 15h10"/></>,
    chart: <><path d="M3 3v18h18"/><path d="M7 14l4-4 4 4 5-5"/></>,
    sparkles: <><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></>,
    pen: <><path d="M17 3l4 4L7 21H3v-4L17 3z"/></>,
    chevR: <path d="M9 6l6 6-6 6"/>,
    chevD: <path d="M6 9l6 6 6-6"/>,
    plus: <><path d="M12 5v14M5 12h14"/></>,
    filter: <path d="M22 3H2l8 9.5V19l4 2v-8.5L22 3z"/>,
    ext: <><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><path d="M15 3h6v6"/><path d="M10 14L21 3"/></>,
    check: <path d="M20 6L9 17l-5-5"/>,
    dot: <circle cx="12" cy="12" r="4" fill={color} stroke="none"/>,
    git: <><circle cx="12" cy="12" r="9"/><path d="M8 12h8M12 8v8"/></>,
    code: <><path d="M16 18l6-6-6-6M8 6l-6 6 6 6"/></>,
    lock: <><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></>,
    play: <path d="M5 3l14 9-14 9V3z" fill={color}/>,
    clock: <><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></>,
    cmd: <path d="M18 3a3 3 0 100 6h-3V6a3 3 0 10-6 3h3v6H9a3 3 0 106-3V9h3a3 3 0 000-6z"/>,
    dl: <><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></>,
    share: <><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
    settings: <><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3H9a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8V9a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></>,
    moreH: <><circle cx="6" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="12" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="18" cy="12" r="1.4" fill={color} stroke="none"/></>,
    status_done:  <><circle cx="12" cy="12" r="9" fill={color} stroke="none"/><path d="M8 12l3 3 5-6" stroke="#fff"/></>,
    status_run:   <><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2.5"/></>,
    status_todo:  <><circle cx="12" cy="12" r="9" strokeDasharray="2 3"/></>,
    status_queue: <circle cx="12" cy="12" r="9"/>,
    arrowR: <><path d="M5 12h14M12 5l7 7-7 7"/></>,
  };
  return <svg {...p}>{paths[name]}</svg>;
};
window.Icon = Icon;
</script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ── DESIGN TOKENS ─────────────────────────────────────────────── */
const T = {
  bg: '#fbfbfa', sb: '#f5f5f4', s1: '#ffffff', s2: '#f7f7f6', s3: '#f0efed',
  b1: '#e8e8e6', b2: '#d4d4d2', tx: '#0a0a0b', t2: '#4a4a50', t3: '#8a8a92', t4: '#b0b0b8',
  // Section accent colors (desaturated, Linear-ish)
  search: '#5e9c6f', read: '#5e6ad2', research: '#8957c9', result: '#c07b3a',
  insight: '#c04e68', writing: '#3aa3a3',
};
const mono = { fontFamily: "'JetBrains Mono', monospace", fontFeatureSettings: 'normal' };

const SECTIONS = [
  { id: 'search',   label: 'Search',   sub: '논문 서치 및 수집',        color: T.search,   icon: 'search',   kbd: '1' },
  { id: 'read',     label: 'Reading',  sub: 'AI 논문 리딩',             color: T.read,     icon: 'book',     kbd: '2' },
  { id: 'research', label: 'Research', sub: '재현연구 및 실험',          color: T.research, icon: 'flask',    kbd: '3' },
  { id: 'results',  label: 'Result',   sub: '결과 도출 및 정리',         color: T.result,   icon: 'chart',    kbd: '4' },
  { id: 'insights', label: 'Insight',  sub: '인사이트 취합',             color: T.insight,  icon: 'sparkles', kbd: '5' },
  { id: 'writing',  label: 'Writing',  sub: '논문 작성 보조',            color: T.writing,  icon: 'pen',      kbd: '6' },
];

/* ── ATOMS ──────────────────────────────────────────────────────── */
const Tag = ({ label, color, dot }) => (
  <span className="tag" style={color ? { background: `${color}12`, color, borderColor: `${color}30` } : {}}>
    {dot && <span style={{ width: 5, height: 5, borderRadius: '50%', background: color || T.t3 }} />}
    {label}
  </span>
);

const StatusIcon = ({ status }) => {
  // done / running / todo / queue
  const map = { done: T.search, running: T.result, todo: T.t3, queue: T.t4 };
  const color = map[status] || T.t3;
  if (status === 'done') return <Icon name="status_done" size={14} color={color} />;
  if (status === 'running') return (
    <span style={{ display: 'inline-flex', animation: 'pulse 1.5s infinite' }}>
      <Icon name="status_run" size={14} color={color} />
    </span>
  );
  if (status === 'todo')  return <Icon name="status_todo"  size={14} color={T.t3} />;
  return <Icon name="status_queue" size={14} color={T.t4} />;
};

const Kbd = ({ children }) => <span className="kbd">{children}</span>;

/* ── SCREEN 1: Search ──────────────────────────────────────────── */
function SearchScreen() {
  const [sel, setSel] = useState(0);
  const papers = [
    { title: 'Reducing Reranker Costs in RAG via Adaptive Skipping', auth: 'Kim et al.', venue: 'ACL 2024', rel: 98, code: true, saved: true },
    { title: 'Efficient RAG with Lightweight Rerankers', auth: 'Chen et al.', venue: 'EMNLP 2024', rel: 91, code: true, saved: false },
    { title: 'FlashRAG: A Modular Framework for RAG Research', auth: 'Jin et al.', venue: 'arXiv', rel: 87, code: true, saved: true },
    { title: 'Is Reranking Really Necessary for RAG?', auth: 'Park et al.', venue: 'ACL 2024', rel: 78, code: false, saved: false },
    { title: 'RAGLAB: Research-Oriented Unified Framework', auth: 'Zhang et al.', venue: 'arXiv', rel: 72, code: true, saved: false },
  ];
  const sp = papers[sel];
  return (
    <div style={{ display: 'flex', height: '100%' }}>
      {/* Filters */}
      <div style={{ width: 200, borderRight: `1px solid ${T.b1}`, background: T.s2, flexShrink: 0, overflow: 'auto', padding: '16px 18px' }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 10 }}>Filter</div>
        {[['Venue', ['arXiv', 'ACL', 'EMNLP', 'NeurIPS', 'ICML']], ['Year', ['2024', '2023', 'Earlier']]].map(([hdr, items]) => (
          <div key={hdr} style={{ marginBottom: 16 }}>
            <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>{hdr}</div>
            {items.map((v, i) => (
              <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 7, fontSize: 12.5, color: T.t2, padding: '3px 0', cursor: 'pointer' }}>
                <div style={{ width: 13, height: 13, border: `1.5px solid ${i < 3 ? T.tx : T.b2}`, borderRadius: 3, background: i < 3 ? T.tx : 'transparent', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>
                  {i < 3 && <Icon name="check" size={9} color="#fff" />}
                </div>
                {v}
              </label>
            ))}
          </div>
        ))}
        <div style={{ marginBottom: 16 }}>
          <div style={{ fontSize: 11, color: T.t3, marginBottom: 8 }}>Relevance</div>
          <input type="range" min="0" max="100" defaultValue="70" style={{ width: '100%', accentColor: T.tx }} />
          <div style={{ fontSize: 11, color: T.t2, ...mono, marginTop: 3 }}>≥ 70%</div>
        </div>
        <div style={{ borderTop: `1px solid ${T.b1}`, marginTop: 6, paddingTop: 14 }}>
          <div style={{ fontSize: 11, color: T.t3, marginBottom: 8 }}>Library</div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 5 }}>
            <span style={{ fontSize: 22, fontWeight: 600, letterSpacing: '-0.03em' }}>12</span>
            <span style={{ fontSize: 11, color: T.t3 }}>papers</span>
          </div>
          <div style={{ display: 'flex', gap: 4, marginTop: 8 }}>
            <Tag label="3 saved" color={T.search} dot />
            <Tag label="9 new" />
          </div>
        </div>
      </div>

      {/* List */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <div style={{ padding: '14px 20px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <div style={{ flex: 1, display: 'flex', gap: 8, background: T.s1, border: `1px solid ${T.b1}`, borderRadius: 6, padding: '7px 11px', alignItems: 'center' }}>
              <Icon name="search" size={15} color={T.t3} />
              <span style={{ fontSize: 13, color: T.t3, flex: 1 }}>RAG reranker cost 줄이는 방법...</span>
              <Kbd>⌘K</Kbd>
            </div>
            <button className="btn-p">Search</button>
          </div>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginTop: 10, fontSize: 12, color: T.t3 }}>
            <span style={{ color: T.t2, fontWeight: 500 }}>12 results</span>
            <span>·</span>
            <span>Sorted by relevance</span>
            <span>·</span>
            <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4, color: T.search }}>
              <span style={{ width: 5, height: 5, borderRadius: '50%', background: T.search, animation: 'pulse 1.5s infinite' }} />
              Scout agent
            </span>
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'auto' }}>
          {papers.map((p, i) => (
            <div key={i} className="hov-row" onClick={() => setSel(i)} style={{
              padding: '11px 20px',
              borderBottom: `1px solid ${T.b1}`,
              background: sel === i ? 'rgba(94,106,210,0.04)' : 'transparent',
              borderLeft: sel === i ? `2px solid ${T.read}` : '2px solid transparent',
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 12,
            }}>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 500, color: T.tx, marginBottom: 5, letterSpacing: '-0.01em' }}>{p.title}</div>
                <div style={{ display: 'flex', gap: 5, alignItems: 'center', flexWrap: 'wrap' }}>
                  <span style={{ fontSize: 11.5, color: T.t3 }}>{p.auth}</span>
                  <span style={{ color: T.t4, fontSize: 10 }}>·</span>
                  <Tag label={p.venue} />
                  {p.code && <Tag label="code" color={T.search} />}
                  {p.saved && <Tag label="saved" color={T.read} />}
                </div>
              </div>
              <div style={{ fontSize: 13, fontWeight: 600, color: sel === i ? T.read : T.t2, ...mono, letterSpacing: '-0.02em' }}>{p.rel}%</div>
            </div>
          ))}
        </div>
      </div>

      {/* Preview */}
      <div style={{ width: 300, borderLeft: `1px solid ${T.b1}`, background: T.s1, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '16px 18px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ fontSize: 10.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Paper</div>
          <div style={{ fontSize: 14, fontWeight: 550, lineHeight: 1.4, marginBottom: 10, letterSpacing: '-0.01em' }}>{sp.title}</div>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            <Tag label={sp.auth} /><Tag label={sp.venue} />
            {sp.code && <Tag label="code" color={T.search} />}
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'auto', padding: '14px 18px' }}>
          <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Abstract</div>
          <div style={{ fontSize: 12.5, color: T.t2, lineHeight: 1.65, marginBottom: 14 }}>
            기존 RAG는 모든 쿼리에 reranker를 적용. 본 논문은 retriever 신뢰도 기반 Adaptive Skip 메커니즘으로 40% 비용 절감, BEIR SOTA 달성.
          </div>
          <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Key points</div>
          {['Cascade confidence scoring', '40% reranker cost 절감', 'BEIR benchmark SOTA', 'DPR + BM25 기반'].map(c => (
            <div key={c} style={{ display: 'flex', gap: 8, padding: '3px 0', fontSize: 12.5, color: T.t2, alignItems: 'center' }}>
              <Icon name="dot" size={6} color={T.search} />{c}
            </div>
          ))}
          <div style={{ marginTop: 14, padding: '10px 12px', background: T.s2, borderRadius: 6, border: `1px solid ${T.b1}`, display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="git" size={14} color={T.t2} />
            <span style={{ fontSize: 12, color: T.read, ...mono, flex: 1 }}>kim-lab/ara</span>
            <Icon name="ext" size={13} color={T.t3} />
          </div>
        </div>
        <div style={{ padding: '12px 18px', borderTop: `1px solid ${T.b1}`, display: 'flex', gap: 7 }}>
          <button className="btn-p" style={{ flex: 1, justifyContent: 'center' }}>Save</button>
          <button className="btn-s" style={{ flex: 1, justifyContent: 'center' }}>Read <Icon name="arrowR" size={12} /></button>
        </div>
      </div>
    </div>
  );
}

/* ── SCREEN 2: Reading ────────────────────────────────────────── */
function ReadScreen() {
  const hl = [
    { type: 'Method', color: T.read, text: 'cascade confidence scoring을 통해 retriever 신뢰도가 임계값 이하인 쿼리에만 reranker를 호출하는 선택적 실행 메커니즘' },

          {[['H1', '쿼리별 threshold 동적 조정 → cost 절감 + 성능 향상 동시 달성'], ['H2', '다국어에서 skip 패턴이 언어별 신뢰도 차이로 달라질 것'], ['H3', 'Lightweight scorer로 skip 판단 대체 → latency 추가 절감 가능']].map(([id, t], i) => (
            <div key={i} style={{ background: T.s1, border: `1px solid ${T.b1}`, borderRadius: 6, padding: '11px 14px', display: 'flex', gap: 12, marginBottom: 7 }}>
              <span style={{ fontSize: 11.5, fontWeight: 600, color: T.writing, ...mono, flexShrink: 0 }}>{id}</span>
              <span style={{ fontSize: 12.5, color: T.t2, lineHeight: 1.6 }}>{t}</span>
            </div>
          ))}
          <button className="btn-p" style={{ width: '100%', marginTop: 6, justifyContent: 'center' }}>
            연구 제안서 초안 생성 <Icon name="arrowR" size={13} />
          </button>
        </div>
      </div>

      <div style={{ width: 310, borderLeft: `1px solid ${T.b1}`, background: T.s1, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.b1}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontSize: 13, fontWeight: 550 }}>연구 메모</div>
            <div style={{ fontSize: 11, color: T.t3 }}>Adaptive Skipping</div>
          </div>
          <Kbd>⌘E</Kbd>
        </div>
        <textarea value={note} onChange={e => setNote(e.target.value)}
          style={{ flex: 1, border: 'none', outline: 'none', resize: 'none', padding: '16px 18px', fontSize: 12.5, fontFamily: "'JetBrains Mono', monospace", color: T.t2, background: T.s1, lineHeight: 1.85 }} />
        <div style={{ borderTop: `1px solid ${T.b1}`, padding: '10px 18px', display: 'flex', gap: 6 }}>
          {['실패 자산화', '후속 가설', '내보내기'].map(l => (
            <button key={l} className="btn-s" style={{ flex: 1, justifyContent: 'center', fontSize: 11.5, padding: '5px 4px' }}>{l}</button>
          ))}
        </div>
      </div>
    </div>
  );
}

          <div style={{ fontSize: 11.5, color: T.t2, lineHeight: 1.75 }}>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>Words <span style={{ ...mono, color: T.tx }}>1,284</span></div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>Pages <span style={{ ...mono, color: T.tx }}>3.2</span></div>
            <div style={{ display: 'flex', justifyContent: 'space-between' }}>Refs <span style={{ ...mono, color: T.tx }}>14</span></div>
          </div>
        </div>
      </div>
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        <div style={{ padding: '12px 24px', borderBottom: `1px solid ${T.b1}`, background: T.s1, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 13, fontWeight: 550 }}>{secs[sec]}</div>
          <div style={{ display: 'flex', gap: 7 }}>
            <button className="btn-s"><Icon name="sparkles" size={13} color={T.writing} /> AI draft</button>
            <button className="btn-s"><Icon name="dl" size={13} /> Export</button>

        <div style={{ flex: 1, overflow: 'auto', padding: '28px 40px' }}>

            <p style={{ fontSize: 14, lineHeight: 1.85, color: T.t2, marginBottom: 14 }}>
              We revisit the Adaptive Skipping mechanism proposed by Kim et al. (2024) for reducing reranker costs in RAG systems. Our reproduction achieves <span style={{ color: T.tx, fontWeight: 550, ...mono }}>nDCG@10 = 42.3</span>, within <span style={{ color: T.tx, fontWeight: 550 }}>0.8 points</span> of the reported 43.1.
            </p>
            <p style={{ fontSize: 14, lineHeight: 1.85, color: T.t2, marginBottom: 14 }}>
              Through systematic ablation, we confirm that <span style={{ background: `${T.insight}18`, padding: '1px 3px', borderRadius: 2 }}>the cascade confidence scoring is the primary contributor</span>, with its removal leading to a 3.2% performance drop.
            </p>
            <div style={{ background: `${T.writing}0a`, border: `1px dashed ${T.writing}50`, borderRadius: 6, padding: '12px 14px', marginTop: 10, display: 'flex', alignItems: 'center', gap: 10 }}>
              <Icon name="sparkles" size={14} color={T.writing} />

              <button className="btn-s" style={{ padding: '3px 9px', fontSize: 11.5 }}>Accept</button>

const COMPS = { search: SearchScreen, read: ReadScreen, research: ResearchScreen, results: ResultsScreen, insights: InsightsScreen, writing: WritingScreen };

/* ── APP ──────────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('ares_sc3') || 'search');
  const [tweaks, setTweaks] = useState(false);
  const [workflowOpen, setWorkflowOpen] = useState(true);
  const [openWorkflowMenu, setOpenWorkflowMenu] = useState(null);

  useEffect(() => { localStorage.setItem('ares_sc3', screen); }, [screen]);
  useEffect(() => {
    const fn = e => {
      if (e.data?.type === '__activate_edit_mode') setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    };
    window.addEventListener('message', fn);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', fn);
  }, []);
  useEffect(() => {
    const kb = e => {
      if ((e.metaKey || e.ctrlKey) && /^[1-6]$/.test(e.key)) {
        e.preventDefault();
        setScreen(SECTIONS[+e.key - 1].id);
      }
    };
    window.addEventListener('keydown', kb);
    return () => window.removeEventListener('keydown', kb);
  }, []);
  useEffect(() => {
    const closeMenu = () => setOpenWorkflowMenu(null);
    document.addEventListener('click', closeMenu);
    return () => document.removeEventListener('click', closeMenu);
  }, []);

  const Comp = COMPS[screen];
  const cur = SECTIONS.find(s => s.id === screen);

  return (
    <div style={{ display: 'flex', height: '100vh', background: T.bg, overflow: 'hidden' }}>
      {/* Sidebar */}
      <div className="desktop-sidebar" style={{ width: 232, background: T.sb, borderRight: `1px solid ${T.b1}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        {/* Workspace switcher */}
        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div className="hov" style={{ padding: '6px 8px', borderRadius: 6, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 9 }}>
            <div style={{ width: 24, height: 24, borderRadius: 6, background: 'linear-gradient(135deg, #5e6ad2, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 11, fontWeight: 700, letterSpacing: '-0.02em' }}>A</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 550, letterSpacing: '-0.01em' }}>ARES</div>
              <div style={{ fontSize: 10.5, color: T.t3 }}>Research workspace</div>
            </div>
            <Icon name="chevD" size={13} color={T.t3} />
          </div>
        </div>

        {/* Project + search */}
        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div className="hov-soft" style={{ padding: '5px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
            <Icon name="search" size={13.5} color={T.t3} />
            <span style={{ fontSize: 12.5, color: T.t3, flex: 1 }}>Search</span>
            <Kbd>⌘K</Kbd>
          </div>
          <div className="hov-soft" style={{ padding: '5px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="plus" size={13.5} color={T.t3} />
            <span style={{ fontSize: 12.5, color: T.t3, flex: 1 }}>New paper</span>
            <Kbd>C</Kbd>
          </div>
        </div>

        {/* Project */}
        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.08em', padding: '4px 8px 6px' }}>Project</div>
          {[
            ['RAG Reranker Study', true, '#5e6ad2'],
            ['LLM Reasoning',       false, '#c04e68'],
            ['Local Inference',     false, '#3aa3a3'],
          ].map(([p, active, c], i) => (
            <div key={i} className="hov" style={{
              padding: '5px 8px', borderRadius: 5, cursor: 'pointer',
              background: active ? 'rgba(0,0,0,0.045)' : 'transparent',
              display: 'flex', alignItems: 'center', gap: 9, marginBottom: 1,
            }}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
              <span style={{ fontSize: 12.5, color: active ? T.tx : T.t2, fontWeight: active ? 550 : 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{p}</span>
            </div>
          ))}
        </div>

        {/* Pipeline nav */}
        <div style={{ padding: '10px 12px', flex: 1, overflow: 'auto' }}>
          <button type="button" className="workflow-toggle" onClick={() => setWorkflowOpen(v => !v)}>
            <span style={{ fontSize: 10.5, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.08em' }}>Workflow</span>
            <Icon name={workflowOpen ? 'chevD' : 'chevR'} size={12} color={T.t3} />
          </button>
          {workflowOpen && SECTIONS.map(s => (
            <div key={s.id} onClick={() => setScreen(s.id)} className={`hov workflow-item${screen === s.id ? ' is-active' : ''}`} style={{
              padding: '6px 8px', borderRadius: 6, cursor: 'pointer', marginBottom: 1,
              background: screen === s.id ? 'rgba(0,0,0,0.05)' : 'transparent',
              display: 'flex', alignItems: 'center', gap: 10,
              transition: 'background 0.08s',
            }}>
              <div style={{
                width: 22, height: 22, borderRadius: 5, flexShrink: 0,
                background: screen === s.id ? s.color : `${s.color}1a`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'background 0.08s',
              }}>
                <Icon name={s.icon} size={13} color={screen === s.id ? '#fff' : s.color} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12.5, fontWeight: screen === s.id ? 550 : 450, color: screen === s.id ? T.tx : T.t2, letterSpacing: '-0.005em' }}>{s.label}</div>
              </div>
              <div className="workflow-side-actions" style={{ display: 'flex', alignItems: 'center', gap: 2, marginLeft: 4, position: 'relative' }}>
                <button
                  type="button"
                  className="sidebar-icon-btn workflow-menu"
                  aria-label={`${s.label} context menu`}
                  title="Open context menu"
                  onClick={(e) => {
                    e.stopPropagation();
                    setOpenWorkflowMenu(cur => cur === s.id ? null : s.id);
                  }}
                >
                  <Icon name="moreH" size={14} color="currentColor" />
                </button>
                {openWorkflowMenu === s.id && (
                  <div className="sidebar-menu" onClick={(e) => e.stopPropagation()}>
                    <button type="button" className="sidebar-menu-item" onClick={() => { setScreen(s.id); setOpenWorkflowMenu(null); }}>
                      Open stage
                    </button>
                    <button type="button" className="sidebar-menu-item" onClick={() => setOpenWorkflowMenu(null)}>
                      Copy deep link
                    </button>
                    <div className="sidebar-menu-divider" />
                    <button type="button" className="sidebar-menu-item" onClick={() => setOpenWorkflowMenu(null)}>
                      Add note
                    </button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>

        {/* Bottom */}
        <div style={{ borderTop: `1px solid ${T.b1}`, padding: '8px 12px' }}>
          <div className="hov" style={{ padding: '6px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 9 }}>
            <div style={{ width: 22, height: 22, borderRadius: 11, background: '#c7b299', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10.5, fontWeight: 600, letterSpacing: '-0.02em' }}>DK</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: T.t2 }}>Dokyung</div>
              <div style={{ fontSize: 10, color: T.t3 }}>Pro plan</div>
            </div>
            <Icon name="settings" size={13} color={T.t3} />
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main-wrap" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Topbar */}
        <div style={{ padding: '0 20px', borderBottom: `1px solid ${T.b1}`, background: T.s1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0, height: 44 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            {cur && (
              <div style={{ width: 22, height: 22, borderRadius: 5, background: cur.color, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                <Icon name={cur.icon} size={13} color="#fff" />
              </div>
            )}
            <div style={{ fontSize: 13.5, fontWeight: 600, color: T.tx, letterSpacing: '-0.01em' }}>{cur?.label}</div>
            <span style={{ fontSize: 11.5, color: T.t4 }}>·</span>
            <span style={{ fontSize: 12, color: T.t3 }}>{cur?.sub}</span>
          </div>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <button className="btn-s" style={{ padding: '3px 8px', fontSize: 11.5 }}><Icon name="share" size={12} /> Share</button>
            <button className="btn-s" style={{ padding: '3px 8px', fontSize: 11.5 }}><Icon name="filter" size={12} /> Filter</button>
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
          <Comp />
        </div>
      </div>

      {/* Mobile bottom nav */}
      <div className="bottom-nav" style={{ justifyContent: 'space-around' }}>
        {SECTIONS.map(s => (
          <div key={s.id} onClick={() => setScreen(s.id)} style={{
            flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
            padding: '6px 2px', cursor: 'pointer', gap: 3,
            background: screen === s.id ? `${s.color}10` : 'transparent',
            borderRadius: 6, margin: '2px 2px',
          }}>
            <Icon name={s.icon} size={17} color={screen === s.id ? s.color : T.t3} />
            <span style={{ fontSize: 9.5, color: screen === s.id ? T.tx : T.t3, fontWeight: screen === s.id ? 600 : 400 }}>{s.label}</span>
          </div>
        ))}
      </div>

      {/* Tweaks */}
      {tweaks && (
        <div style={{
          position: 'fixed', bottom: 20, right: 20, background: T.s1,
          border: `1px solid ${T.b1}`, borderRadius: 8, padding: '14px 16px',
          zIndex: 9999, width: 200, boxShadow: '0 6px 24px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06)',
        }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: 8 }}>Tweaks</div>
          {SECTIONS.map(s => (
            <div key={s.id} className="hov" onClick={() => setScreen(s.id)} style={{
              cursor: 'pointer', padding: '5px 8px', borderRadius: 5, fontSize: 12.5,
              color: screen === s.id ? s.color : T.t2, fontWeight: screen === s.id ? 600 : 450,
              display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <Icon name={s.icon} size={12.5} color={screen === s.id ? s.color : T.t3} />
              {s.label}
              <span style={{ flex: 1 }} />
              <Kbd>⌘{s.kbd}</Kbd>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
