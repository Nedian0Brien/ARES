<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARES Reading Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;550;600;650;700&family=JetBrains+Mono:wght@400;500&family=Newsreader:opsz,wght@6..72,500;6..72,600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fbfbfa;
      --sb: #f5f5f4;
      --s1: #ffffff;
      --s2: #f7f7f6;
      --s3: #f0efed;
      --b1: #e8e8e6;
      --b2: #d4d4d2;
      --tx: #0a0a0b;
      --t2: #4a4a50;
      --t3: #8a8a92;
      --t4: #b0b0b8;
      --read: #5e6ad2;
      --read-soft: rgba(94, 106, 210, 0.08);
      --search: #5e9c6f;
      --search-soft: rgba(94, 156, 111, 0.12);
      --warn: #c07b3a;
      --warn-soft: rgba(192, 123, 58, 0.13);
      --shadow-lg: 0 1px 0 rgba(255, 255, 255, 0.68) inset;
      --shadow-sm: none;
      --radius-xl: 8px;
      --radius-lg: 8px;
      --radius-md: 8px;
      --radius-sm: 6px;
      --sidebar-w: 232px;
      --preview-w: 420px;
    }

    html, body {
      background: var(--bg);
      color: var(--tx);
      font-family: "Inter", sans-serif;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      min-height: 100dvh;
    }

    button, input, select {
      font: inherit;
    }

    button {
      background: none;
      border: none;
      cursor: pointer;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-thumb {
      background: #d8d7d3;
      border-radius: 999px;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
      letter-spacing: 0;
    }

    .shell {
      display: grid;
      grid-template-columns: var(--sidebar-w) minmax(0, 1fr);
      min-height: 100dvh;
      background: var(--bg);
    }

    .sidebar {
      background: var(--sb);
      border-right: 1px solid var(--b1);
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 16px 14px 14px;
      position: sticky;
      top: 0;
      min-height: 100dvh;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 2px 8px;
    }

    .brand-mark {
      align-items: center;
      display: inline-flex;
      height: 22px;
      justify-content: center;
      width: 22px;
    }

    .brand-copy {
      display: flex;
      flex-direction: column;
    }

    .brand-name {
      font-size: 13px;
      font-weight: 650;
      letter-spacing: -0.02em;
    }

    .sidebar-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-label {
      color: var(--t3);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.09em;
      padding: 0 10px;
      text-transform: uppercase;
    }

    .sidebar-card {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      box-shadow: none;
      padding: 8px;
    }

    .sidebar-project {
      align-items: center;
      border-radius: 8px;
      color: var(--t2);
      display: flex;
      gap: 10px;
      padding: 9px 10px;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .sidebar-project:hover {
      background: rgba(0, 0, 0, 0.035);
      color: var(--tx);
      transform: translateY(-1px);
    }

    .sidebar-project.is-active {
      background: rgba(94, 106, 210, 0.08);
      box-shadow: inset 0 0 0 1px rgba(94, 106, 210, 0.18);
      color: var(--tx);
    }

    .sidebar-project-copy {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }

    .sidebar-project-title {
      font-size: 13px;
      font-weight: 550;
      letter-spacing: -0.015em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .sidebar-project-meta {
      color: var(--t3);
      font-size: 11px;
    }

    .sidebar-stage {
      align-items: center;
      border-radius: 8px;
      color: var(--t2);
      display: flex;
      gap: 10px;
      padding: 10px 12px;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .sidebar-stage:hover {
      background: rgba(0, 0, 0, 0.03);
      color: var(--tx);
      transform: translateY(-1px);
    }

    .sidebar-stage.is-active {
      background: var(--read-soft);
      color: var(--read);
      box-shadow: inset 2px 0 0 var(--read), inset 0 0 0 1px rgba(94, 106, 210, 0.14);
    }

    .sidebar-stage-label {
      font-size: 13px;
      font-weight: 550;
      letter-spacing: -0.015em;
    }

    .sidebar-footer {
      margin-top: auto;
    }

    .sidebar-link {
      align-items: center;
      border-radius: 8px;
      color: var(--t2);
      display: flex;
      gap: 10px;
      padding: 10px 12px;
    }

    .workspace {
      min-width: 0;
    }

    .topbar {
      align-items: center;
      backdrop-filter: blur(14px) saturate(1.2);
      background: rgba(251, 251, 250, 0.78);
      border-bottom: 1px solid rgba(232, 232, 230, 0.9);
      display: flex;
      gap: 16px;
      justify-content: space-between;
      min-height: 44px;
      padding: 8px 20px;
      position: sticky;
      top: 0;
      z-index: 4;
    }

    .topbar-copy {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }

    .topbar-kicker {
      align-items: center;
      color: var(--t3);
      display: flex;
      gap: 8px;
      font-size: 10.5px;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .topbar-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.02em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .topbar-actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .search-box {
      align-items: center;
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      color: var(--t3);
      display: inline-flex;
      gap: 8px;
      min-width: 280px;
      padding: 6px 10px;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: var(--tx);
      flex: 1;
      min-width: 0;
      outline: none;
    }

    .search-kbd {
      background: var(--s2);
      border: 1px solid var(--b1);
      border-radius: 4px;
      color: var(--t3);
      font-size: 10.5px;
      padding: 2px 5px;
    }

    .mode-switch {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(232, 232, 230, 0.98);
      border-radius: 999px;
      display: inline-flex;
      gap: 4px;
      padding: 4px;
    }

    .mode-chip {
      border-radius: 999px;
      color: var(--t3);
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: -0.01em;
      padding: 7px 10px;
      transition: background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .mode-chip:hover {
      color: var(--tx);
      transform: translateY(-1px);
    }

    .mode-chip.is-on {
      background: var(--tx);
      color: #fff;
    }

    .stage {
      margin: 0 auto;
      max-width: 1360px;
      min-height: calc(100dvh - 44px);
      padding: 24px 20px 40px;
      width: 100%;
    }

    .stage-inner {
      animation: fadeUp 420ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .hero {
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr);
      position: relative;
    }

    .hero::before {
      display: none;
    }

    .hero-main,
    .hero-side {
      position: relative;
      z-index: 1;
    }

    .hero-label {
      align-items: center;
      color: var(--read);
      display: inline-flex;
      gap: 8px;
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .hero-title {
      font-family: "Newsreader", serif;
      font-size: clamp(2rem, 3.2vw, 3rem);
      font-weight: 500;
      letter-spacing: -0.035em;
      line-height: 0.98;
      margin-top: 10px;
      max-width: none;
      white-space: nowrap;
    }

    .hero-copy {
      color: var(--t2);
      font-size: 14px;
      line-height: 1.55;
      margin-top: 10px;
      max-width: 72ch;
    }

    .hero-note {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      box-shadow: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 100%;
      padding: 16px;
    }

    .hero-note-label {
      color: var(--t3);
      font-size: 10.5px;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-note-copy {
      color: var(--tx);
      font-size: 13px;
      font-weight: 550;
      letter-spacing: -0.02em;
      line-height: 1.5;
    }

    .hero-note-list {
      display: grid;
      gap: 0;
      list-style: none;
    }

    .hero-note-list li {
      align-items: center;
      border-top: 1px solid rgba(232, 232, 230, 0.9);
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      line-height: 1.45;
      padding: 10px 0;
    }

    .hero-note-list li:first-child {
      border-top: none;
      padding-top: 0;
    }

    .hero-note-key {
      color: var(--t2);
    }

    .hero-note-value {
      color: var(--tx);
      font-size: 12px;
      font-weight: 650;
      letter-spacing: -0.01em;
    }

    .metrics {
      display: grid;
      background: var(--b1);
      border: 1px solid var(--b1);
      border-radius: 10px;
      gap: 1px;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      overflow: hidden;
    }

    .metric-card {
      background: var(--s1);
      border: 0;
      border-radius: 0;
      box-shadow: none;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(0, 1fr) 88px;
      min-height: 94px;
      padding: 14px 16px;
      transition: background 180ms ease;
    }

    .metric-card:hover {
      background: var(--s2);
    }

    .metric-main {
      display: flex;
      flex-direction: column;
      gap: 8px;
      justify-content: center;
      min-width: 0;
    }

    .metric-label-row {
      align-items: center;
      display: flex;
      gap: 6px;
      min-width: 0;
    }

    .metric-icon {
      align-items: center;
      color: var(--t2);
      display: inline-flex;
      flex: 0 0 auto;
      height: 16px;
      justify-content: center;
      width: 16px;
    }

    .metric-icon.is-read {
      color: var(--read);
    }

    .metric-icon.is-done {
      color: var(--search);
    }

    .metric-icon.is-pulse {
      animation: softPulse 1.8s ease-in-out infinite;
      color: var(--warn);
    }

    .metric-label {
      color: var(--t3);
      font-size: 10.5px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .metric-value {
      color: var(--tx);
      font-size: 24px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    .metric-diagram {
      align-items: center;
      display: flex;
      justify-content: flex-end;
    }

    .metric-diagram svg {
      display: block;
      height: 42px;
      width: 88px;
    }

    .metric-area-fill {
      fill: rgba(94, 106, 210, 0.08);
    }

    .metric-area-line {
      fill: none;
      stroke: var(--read);
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 2;
    }

    .metric-area-axis {
      fill: none;
      stroke: rgba(212, 212, 210, 0.86);
      stroke-width: 1;
    }

    .metric-band-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      width: 88px;
    }

    .metric-band {
      background: var(--s3);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
      width: 100%;
    }

    .metric-band-fill {
      background: rgba(94, 106, 210, 0.82);
      border-radius: 999px;
      display: block;
      height: 100%;
    }

    .metric-bars {
      align-items: end;
      display: flex;
      gap: 4px;
      height: 42px;
      justify-content: flex-end;
      width: 88px;
    }

    .metric-bar {
      background: rgba(192, 123, 58, 0.22);
      border-radius: 3px;
      display: block;
      flex: 0 0 8px;
    }

    .metric-bar.is-active {
      background: var(--warn);
    }

    .metric-dot-grid {
      display: grid;
      gap: 6px;
      grid-template-columns: repeat(4, 1fr);
      width: 72px;
    }

    .metric-dot {
      background: rgba(94, 156, 111, 0.18);
      border-radius: 999px;
      display: block;
      height: 8px;
      width: 8px;
    }

    .metric-dot.is-active {
      background: var(--search);
    }

    .content {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1fr) minmax(300px, var(--preview-w));
    }

    .content.is-resizable {
      align-items: start;
      gap: 0;
      grid-template-columns: minmax(0, 1fr) 14px minmax(360px, var(--preview-panel-w));
    }

    .panel-resizer-wrap {
      align-self: stretch;
      display: flex;
      justify-content: center;
    }

    .panel-resizer {
      cursor: col-resize;
      min-height: 100%;
      position: relative;
      width: 14px;
    }

    .panel-resizer::before {
      background: var(--b1);
      content: "";
      inset: 0 auto 0 50%;
      position: absolute;
      transform: translateX(-50%);
      width: 1px;
    }

    .panel-resizer::after {
      background: var(--s3);
      border-radius: 999px;
      content: "";
      height: 42px;
      left: 50%;
      position: absolute;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 4px;
    }

    .panel-resizer:hover::after {
      background: rgba(94, 106, 210, 0.22);
    }

    .panel {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 8px;
      box-shadow: none;
      min-width: 0;
      overflow: hidden;
    }

    .panel-head {
      align-items: center;
      border-bottom: 1px solid rgba(232, 232, 230, 0.92);
      display: flex;
      gap: 12px;
      justify-content: space-between;
      padding: 14px 16px;
    }

    .panel-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-width: 0;
    }

    .panel-kicker {
      color: var(--t3);
      font-size: 10.5px;
      font-weight: 650;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .panel-title {
      color: var(--tx);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .panel-sub {
      color: var(--t3);
      font-size: 12px;
      line-height: 1.45;
    }

    .list-tools {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      padding: 12px 16px 0;
    }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-chip {
      align-items: center;
      background: var(--s2);
      border: 1px solid transparent;
      border-radius: 999px;
      color: var(--t2);
      display: inline-flex;
      gap: 8px;
      font-size: 12px;
      font-weight: 550;
      letter-spacing: -0.01em;
      padding: 7px 11px;
      transition: border-color 180ms ease, background 180ms ease, color 180ms ease, transform 180ms ease;
    }

    .filter-chip:hover {
      border-color: rgba(212, 212, 210, 0.88);
      color: var(--tx);
      transform: translateY(-1px);
    }

    .filter-chip.is-on {
      background: rgba(94, 106, 210, 0.08);
      border-color: rgba(94, 106, 210, 0.18);
      color: var(--read);
    }

    .filter-chip-count {
      color: inherit;
      opacity: 0.75;
    }

    .toolbar-actions {
      display: inline-flex;
      gap: 8px;
    }

    .btn-p,
    .btn-s,
    .ghost-btn,
    .primary-btn,
    .secondary-btn {
      align-items: center;
      display: inline-flex;
      gap: 8px;
      justify-content: center;
      letter-spacing: -0.01em;
      transition: transform 180ms ease, border-color 180ms ease, color 180ms ease, background 180ms ease;
    }

    .btn-p,
    .primary-btn {
      background: #18181b;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      min-height: 36px;
      padding: 8px 12px;
    }

    .btn-p:hover,
    .primary-btn:hover {
      background: #26262b;
      transform: translateY(-1px);
    }

    .btn-s,
    .ghost-btn,
    .secondary-btn {
      background: var(--s1);
      border: 1px solid var(--b1);
      border-radius: 6px;
      color: var(--tx);
      font-size: 13px;
      font-weight: 500;
      min-height: 36px;
      padding: 7px 11px;
    }

    .btn-s:hover,
    .ghost-btn:hover,
    .secondary-btn:hover {
      background: var(--s2);
      border-color: var(--b2);
      transform: translateY(-1px);
    }

    .table {
      padding: 10px 16px 14px;
    }

    .table-head,
    .paper-row {
      align-items: center;
      display: grid;
      gap: 12px;
      grid-template-columns: minmax(260px, 2.8fr) minmax(88px, 1fr) 76px 70px 108px 28px;
    }

    .table-head {
      border-bottom: 1px solid rgba(232, 232, 230, 0.94);
      color: var(--t4);
      font-size: 11px;
      font-weight: 650;
      letter-spacing: 0.06em;
      padding: 0 14px 14px;
      text-transform: uppercase;
    }

    .paper-row {
      background: transparent;
      border-bottom: 1px solid rgba(232, 232, 230, 0.9);
      color: var(--t2);
      padding: 16px 14px;
      position: relative;
      text-align: left;
      transition: background 180ms ease, transform 180ms ease;
      width: 100%;
    }

    .paper-row:hover {
      background: rgba(0, 0, 0, 0.025);
      transform: translateY(-1px);
    }

    .paper-row.is-selected {
      background: rgba(94, 106, 210, 0.05);
      box-shadow: inset 2px 0 0 var(--read);
    }

    .paper-main {
      align-items: flex-start;
      display: flex;
      gap: 12px;
      min-width: 0;
    }

    .paper-file {
      align-items: center;
      color: var(--t3);
      display: inline-flex;
      flex: 0 0 auto;
      height: 22px;
      justify-content: center;
      margin-top: 2px;
      width: 22px;
    }

    .paper-copy {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .paper-title {
      color: var(--tx);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.35;
    }

    .paper-authors {
      color: var(--t3);
      font-size: 12px;
      line-height: 1.45;
    }

    .paper-mobile-meta {
      display: none;
    }

    .paper-meta {
      color: var(--t2);
      font-size: 12px;
      line-height: 1.45;
    }

    .paper-cell {
      color: var(--t2);
      font-size: 12px;
    }

    .paper-menu {
      color: var(--t3);
      display: inline-flex;
      justify-content: flex-end;
    }

    .status-pill {
      align-items: center;
      border-radius: 999px;
      display: inline-flex;
      font-size: 11.5px;
      font-weight: 600;
      gap: 6px;
      letter-spacing: -0.01em;
      padding: 7px 10px;
      white-space: nowrap;
    }

    .status-pill.ready {
      background: rgba(94, 106, 210, 0.08);
      color: var(--read);
    }

    .status-pill.running {
      background: rgba(192, 123, 58, 0.11);
      color: var(--warn);
    }

    .status-pill.done {
      background: rgba(94, 156, 111, 0.12);
      color: var(--search);
    }

    .status-pill.saved {
      background: rgba(0, 0, 0, 0.045);
      color: var(--t2);
    }

    .status-pill .dot {
      border-radius: 999px;
      display: inline-flex;
      flex: 0 0 auto;
      height: 6px;
      width: 6px;

        <svg className="readiness-donut" viewBox="0 0 42 42" aria-label={`Reading readiness ${value}%`}>

          <text className="readiness-donut-value" x="21" y="21">

    function MainState() {
      const [filter, setFilter] = useState("all");
      const [selectedId, setSelectedId] = useState(MAIN_PAPERS[0].id);
      const [previewWidth, setPreviewWidth] = useState(420);
      const [layout, setLayout] = useState(() => detectReadingLayout());
      const [previewLayerOpen, setPreviewLayerOpen] = useState(false);

      const visible = filterPapers(MAIN_PAPERS, filter);

      useEffect(() => {
        if (!visible.some((paper) => paper.id === selectedId)) {
          setSelectedId(visible[0]?.id || "");
        }
      }, [filter, selectedId, visible]);

      useEffect(() => {
        function syncLayout() {
          setLayout(detectReadingLayout());
        }

        window.addEventListener("resize", syncLayout);
        return () => window.removeEventListener("resize", syncLayout);
      }, []);

      useEffect(() => {
        if (layout === "desktop") {
          setPreviewLayerOpen(false);
        }
      }, [layout]);

      useEffect(() => {
        if (!previewLayerOpen || layout === "desktop") return undefined;

        function handleKeyDown(event) {
          if (event.key === "Escape") {
            setPreviewLayerOpen(false);
          }
        }

        const previousOverflow = document.body.style.overflow;
        document.body.style.overflow = "hidden";
        window.addEventListener("keydown", handleKeyDown);

        return () => {
          document.body.style.overflow = previousOverflow;
          window.removeEventListener("keydown", handleKeyDown);
        };
      }, [layout, previewLayerOpen]);

      const selected = visible.find((paper) => paper.id === selectedId) || MAIN_PAPERS[0];
      const selectedActions = actionLabelsForPaper(selected);
      const isDesktop = layout === "desktop";
      const overlaySurface = layout === "tablet" ? "drawer" : "modal";

      function handlePaperSelect(paperId) {
        setSelectedId(paperId);
        if (!isDesktop) {
          setPreviewLayerOpen(true);
        }
      }

      function startPreviewResize(event) {
        if (!isDesktop) return;
        event.preventDefault();
        const startX = event.clientX;
        const startWidth = previewWidth;

        function onMove(moveEvent) {
          const delta = startX - moveEvent.clientX;
          const next = Math.max(360, Math.min(560, startWidth + delta));
          setPreviewWidth(next);
        }

        function onUp() {
          window.removeEventListener("pointermove", onMove);
          window.removeEventListener("pointerup", onUp);
          document.body.style.userSelect = "";
          document.body.style.cursor = "";
        }

        document.body.style.userSelect = "none";
        document.body.style.cursor = "col-resize";
        window.addEventListener("pointermove", onMove);
        window.addEventListener("pointerup", onUp);
      }

      return (
        <div className="stage-inner">
          <section className="hero">
            <div className="hero-main">
              <div className="hero-label">
                <Icon name="book" size={14} color={TOKENS.read} />
                <span>Reading workspace</span>
              </div>
              <h1 className="hero-title">Reading Home</h1>
              <p className="hero-copy">Pick a saved paper from Search to start reading or resume an existing session.</p>
            </div>
          </section>

          <section className="metrics">
            <MetricCard icon="bookmark" label="Saved" value={MODE_COUNTS.saved} tone="read" diagram="saved" />
            <MetricCard icon="sparkles" label="Ready" value={MODE_COUNTS.ready} diagram="ready" />
            <MetricCard icon="clock" label="In progress" value={MODE_COUNTS.running} tone="pulse" diagram="running" />
            <MetricCard icon="check" label="Completed" value={MODE_COUNTS.done} tone="done" diagram="done" />
          </section>

          <section
            className={`content ${isDesktop ? "is-resizable" : ""}`.trim()}
            style={isDesktop ? { "--preview-panel-w": `${previewWidth}px` } : undefined}
          >
            <article className="panel">
              <div className="panel-head">
                <div className="panel-title-wrap">
                  <span className="panel-kicker">Worklist</span>
                  <h2 className="panel-title">Saved papers</h2>
                </div>
              </div>

              <div className="list-tools">
                <div className="filter-row">
                  {FILTERS.map((entry) => (
                    <button
                      key={entry.id}
                      type="button"
                      className={`filter-chip ${filter === entry.id ? "is-on" : ""}`}
                      onClick={() => setFilter(entry.id)}
                    >
                      <span>{entry.label}</span>
                      <span className="filter-chip-count mono">{entry.count}</span>
                    </button>
                  ))}
                </div>

                <div className="toolbar-actions">
                  <button type="button" className="ghost-btn">
                    <Icon name="filter" size={13} color={TOKENS.t2} />
                    <span>Filter</span>
                  </button>
                  <button type="button" className="ghost-btn">
                    <span>Sort: Saved newest</span>
                    <Icon name="chevronDown" size={13} color={TOKENS.t3} />
                  </button>
                </div>
              </div>

              <div className="table">
                <div className="table-head">
                  <span>Title / Authors</span>
                  <span>Venue</span>
                  <span>Saved</span>
                  <span>PDF</span>
                  <span>Status</span>
                  <span></span>
                </div>

                {visible.length ? visible.map((paper) => (
                  <button
                    key={paper.id}
                    type="button"
                    className={`paper-row ${selectedId === paper.id ? "is-selected" : ""}`}
                    onClick={() => handlePaperSelect(paper.id)}
                  >
                    <span className="paper-main">
                      <span className="paper-file"><Icon name="file" size={17} color={selectedId === paper.id ? TOKENS.read : TOKENS.t3} /></span>
                      <span className="paper-copy">
                        <span className="paper-title">{paper.title}</span>
                        <span className="paper-authors">{paper.authors}</span>
                        <span className="paper-mobile-meta">
                          <span className="meta-text">{paper.venue}</span>
                          <span className="meta-text mono">{paper.savedAgo}</span>
                          <span className={`pdf-chip ${paper.hasPdf ? "" : "off"}`}>
                            {paper.hasPdf ? <Icon name="check" size={12} color={TOKENS.search} /> : <span className="mono">--</span>}
                            <span>{paper.hasPdf ? "PDF" : "No PDF"}</span>
                          </span>
                          <StatusPill paper={paper} />
                        </span>
                      </span>
                    </span>
                    <span className="paper-cell">{paper.venue}</span>
                    <span className="paper-cell mono">{paper.savedAgo}</span>
                    <span className={`pdf-chip ${paper.hasPdf ? "" : "off"}`}>
                      {paper.hasPdf ? <Icon name="check" size={13} color={TOKENS.search} /> : <span className="mono">--</span>}
                      <span>{paper.hasPdf ? "PDF" : "Missing"}</span>
                    </span>
                    <span><StatusPill paper={paper} /></span>
                    <span className="paper-menu"><Icon name="more" size={16} color={TOKENS.t3} /></span>
                  </button>
                )) : (
                  <div className="empty-panel" style={{ minHeight: 280 }}>
                    <div className="empty-wrap" style={{ maxWidth: 420 }}>
                      <div className="empty-illustration"><Icon name="book" size={34} color={TOKENS.read} /></div>
                      <div className="empty-title" style={{ fontSize: 38 }}>No papers in this slice</div>
                      <div className="empty-copy">No saved papers match this filter.</div>
                    </div>
                  </div>
                )}

                <div className="table-foot">
                  <span>1-25 of 312</span>
                  <div className="pagination">
                    <button type="button" className="page-btn"><Icon name="chevronRight" size={12} color={TOKENS.t3} style={{ transform: "rotate(180deg)" }} /></button>
                    <button type="button" className="page-btn is-on">1</button>
                    <button type="button" className="page-btn">2</button>
                    <button type="button" className="page-btn">3</button>
                    <button type="button" className="page-btn">...</button>
                    <button type="button" className="page-btn">13</button>
                    <button type="button" className="page-btn"><Icon name="chevronRight" size={12} color={TOKENS.t3} /></button>
                  </div>
                </div>
              </div>
            </article>

            {isDesktop ? (
              <>
                <div className="panel-resizer-wrap" aria-hidden="true">
                  <button
                    type="button"
                    className="panel-resizer"
                    onPointerDown={startPreviewResize}
                    onDoubleClick={() => setPreviewWidth(420)}
                    aria-label="Resize preview panel"
                  />
                </div>
                <ReadingPreviewPanel paper={selected} selectedActions={selectedActions} />
              </>
            ) : null}
          </section>

          {!isDesktop ? (
            <div className={`preview-overlay is-${overlaySurface} ${previewLayerOpen ? "is-open" : ""}`}>
              <button
                type="button"
                className="preview-overlay-backdrop"
                aria-label="Close paper detail"
                onClick={() => setPreviewLayerOpen(false)}
              />
              <div className="preview-overlay-panel">
                <div role="dialog" aria-modal="true" aria-label="Paper detail" className="preview-overlay-surface">
                  <ReadingPreviewPanel
                    paper={selected}
                    selectedActions={selectedActions}
                    surface={overlaySurface}
                    onClose={() => setPreviewLayerOpen(false)}
                  />
                </div>
              </div>
            </div>
          ) : null}
        </div>
      );
    }

    function EmptyState() {
      return (
        <div className="stage-inner">
          <section className="hero">
            <div className="hero-main">
              <div className="hero-label">
                <Icon name="book" size={14} color={TOKENS.read} />
                <span>Reading workspace</span>
              </div>
              <h1 className="hero-title">Reading Home</h1>
              <p className="hero-copy">
                Save papers in Search to build a reading queue here.
              </p>
            </div>
          </section>

          <section className="metrics">
            <MetricCard icon="bookmark" label="Saved" value={0} tone="read" diagram="saved" />
            <MetricCard icon="sparkles" label="Ready" value={0} diagram="ready" />
            <MetricCard icon="clock" label="In progress" value={0} diagram="running" />
            <MetricCard icon="check" label="Completed" value={0} tone="done" diagram="done" />
          </section>

          <section className="empty-grid">
            <article className="panel empty-panel">
              <div className="empty-wrap">
                <div className="empty-illustration"><Icon name="bookmark" size={34} color={TOKENS.read} /></div>
                <h2 className="empty-title">Nothing saved yet</h2>
                <p className="empty-copy">
                  Papers saved from Search appear here as a reading queue.
                </p>
                <div className="empty-actions">
                  <button type="button" className="primary-btn">
                    <Icon name="search" size={14} color="#ffffff" />
                    <span>Go to Search</span>
                  </button>
                </div>
              </div>
            </article>
          </section>
        </div>
      );
    }

    function LoadingState() {
      return (
        <div className="stage-inner">
          <section className="hero">
            <div className="hero-main">
              <div className="hero-label">
                <Icon name="book" size={14} color={TOKENS.read} />
                <span>Reading workspace</span>
              </div>
              <h1 className="hero-title">Reading Home</h1>
              <p className="hero-copy">
                Syncing saved papers and reading sessions.
              </p>
            </div>
          </section>

          <section className="metrics">
            {Array.from({ length: 4 }).map((_, index) => (
              <article key={index} className="metric-card">
                <div className="metric-main">
                  <div className="metric-label-row">
                    <div className="skeleton" style={{ width: 14, height: 14, borderRadius: 999 }}></div>
                    <div className="skeleton" style={{ width: 48, height: 10 }}></div>
                  </div>
                  <div className="skeleton" style={{ width: "42%", height: 26 }}></div>
                </div>
                <div className="metric-diagram">
                  <div className="skeleton" style={{ width: 88, height: 34, borderRadius: 8 }}></div>
                </div>
              </article>
            ))}
          </section>

          <section className="loading-grid">
            <article className="panel">
              <div className="panel-head">
                <div className="panel-title-wrap">
                  <span className="panel-kicker">Worklist</span>
                  <h2 className="panel-title">Saved papers</h2>
                </div>
              </div>

              <div className="list-tools">
                <div className="filter-row">
                  {Array.from({ length: 4 }).map((_, index) => (
                    <div key={index} className="skeleton" style={{ width: index === 0 ? 110 : 92, height: 34, borderRadius: 999 }}></div>
                  ))}
                </div>
                <div className="toolbar-actions">
                  <div className="skeleton" style={{ width: 92, height: 36, borderRadius: 12 }}></div>
                  <div className="skeleton" style={{ width: 138, height: 36, borderRadius: 12 }}></div>
                </div>
              </div>

              <div className="table">
                <div className="table-head">
                  <span>Title / Authors</span>
                  <span>Venue</span>
                  <span>Saved</span>
                  <span>PDF</span>
                  <span>Status</span>
                  <span></span>
                </div>

                {Array.from({ length: 7 }).map((_, index) => (
                  <div key={index} className="skeleton-row">
                    <div style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                      <div className="skeleton" style={{ width: 18, height: 18, borderRadius: 6, marginTop: 2 }}></div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8, flex: 1 }}>
                        <div className="skeleton" style={{ width: `${72 - index * 3}%`, height: 14 }}></div>
                        <div className="skeleton" style={{ width: `${56 - index * 2}%`, height: 11 }}></div>
                      </div>
                    </div>
                    <div className="skeleton" style={{ width: "80%", height: 12 }}></div>
                    <div className="skeleton" style={{ width: "68%", height: 12 }}></div>
                    <div className="skeleton" style={{ width: 44, height: 16, borderRadius: 999 }}></div>
                    <div className="skeleton" style={{ width: 96, height: 26, borderRadius: 999 }}></div>
                    <div className="skeleton" style={{ width: 16, height: 16, borderRadius: 999 }}></div>
                  </div>
                ))}

                <div className="table-foot">
                  <span className="loading-copy">Matching saved papers to reading sessions...</span>
                  <div className="pagination">
                    <div className="skeleton" style={{ width: 32, height: 32, borderRadius: 11 }}></div>
                    <div className="skeleton" style={{ width: 32, height: 32, borderRadius: 11 }}></div>
                  </div>
                </div>
              </div>
            </article>

            <aside className="panel preview">
              <div className="loading-preview">
                <div style={{ display: "flex", justifyContent: "space-between", gap: 8 }}>
                  <div className="skeleton" style={{ width: 90, height: 24, borderRadius: 10 }}></div>
                  <div className="skeleton" style={{ width: 48, height: 24, borderRadius: 10 }}></div>
                </div>
                <div className="skeleton" style={{ width: "74%", height: 52, borderRadius: 16 }}></div>
                <div className="skeleton" style={{ width: "92%", height: 14 }}></div>
                <div className="skeleton" style={{ width: "98%", height: 78, borderRadius: 16 }}></div>
                <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {Array.from({ length: 4 }).map((_, index) => (
                    <div key={index} className="skeleton" style={{ width: 96 + index * 8, height: 30, borderRadius: 10 }}></div>
                  ))}
                </div>
                <div className="skeleton" style={{ width: "100%", height: 100, borderRadius: 16 }}></div>
                <div style={{ display: "grid", gap: 10, gridTemplateColumns: "1fr 1fr" }}>
                  <div className="skeleton" style={{ width: "100%", height: 46, borderRadius: 14 }}></div>
                  <div className="skeleton" style={{ width: "100%", height: 46, borderRadius: 14 }}></div>
                </div>
                <div style={{ display: "grid", gap: 10, gridTemplateColumns: "1fr 1fr" }}>
                  <div className="skeleton" style={{ width: "100%", height: 230, borderRadius: 16 }}></div>
                  <div className="skeleton" style={{ width: "100%", height: 230, borderRadius: 16 }}></div>
                </div>
              </div>
            </aside>
          </section>
        </div>
      );
    }

    function App() {
      const [mode, setMode] = useState("main");

      return (
        <>
          <div className="shell">
            <Sidebar />
            <main className="workspace">
              <Topbar />
              <section className="stage">
                {mode === "main" && <MainState />}
                {mode === "empty" && <EmptyState />}
                {mode === "loading" && <LoadingState />}
              </section>
            </main>
          </div>
          <StateDock mode={mode} setMode={setMode} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
