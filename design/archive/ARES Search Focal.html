<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES — Search (Focal)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fbfbfa; --sb: #f5f5f4; --s1: #ffffff; --s2: #f7f7f6; --s3: #f0efed;
  --b1: #e8e8e6; --b2: #d4d4d2;
  --tx: #0a0a0b; --t2: #4a4a50; --t3: #8a8a92; --t4: #b0b0b8;
  --search: #5e9c6f;
  --read:   #5e6ad2;
  --research:#8957c9;
  --result: #c07b3a;
  --insight:#c04e68;
  --writing:#3aa3a3;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  background: var(--bg); color: var(--tx);
  overflow: hidden; -webkit-font-smoothing: antialiased;
  font-size: 13px; letter-spacing: -0.006em;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0; transform: translateY(4px);} to{opacity:1; transform: translateY(0);} }
@keyframes pingRing { 0%{transform:scale(0.6); opacity:0.9;} 80%,100%{transform:scale(2.2); opacity:0;} }
@keyframes slideDown { from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:translateY(0);} }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d8d7d3; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #b8b7b3; }
::-webkit-scrollbar-track { background: transparent; }

.hov:hover { background: rgba(0,0,0,0.035) !important; }
.hov-soft:hover { background: rgba(0,0,0,0.02) !important; }

.kbd {
  font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; color: var(--t3);
  background: var(--s1); border: 1px solid var(--b1); border-radius: 3px;
  padding: 0 5px; min-width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center;
}

button { font-family: inherit; }
.btn-p { background: #18181b; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-p:hover { background: #26262b; }
.btn-s { background: var(--s1); color: var(--tx); border: 1px solid var(--b1); border-radius: 6px; padding: 5px 11px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-s:hover { background: var(--s2); border-color: var(--b2); }
.btn-g { background: transparent; color: var(--t2); border: none; border-radius: 6px; padding: 5px 10px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-g:hover { background: var(--s2); color: var(--tx); }

.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500;
  padding: 1px 7px; border-radius: 4px;
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--b1); white-space: nowrap;
}

/* ── Hero ─────────────────────────────────────────────────── */
.hero-wrap {
  padding: 18px 32px 16px;
  background: linear-gradient(180deg, rgba(94,156,111,0.045) 0%, rgba(94,156,111,0) 100%);
  border-bottom: 1px solid var(--b1);
  position: relative;
}
.hero-input {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1px solid var(--b1); border-radius: 10px;
  padding: 10px 14px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.015), 0 4px 24px rgba(94,156,111,0.05);
  transition: all 150ms ease;
}
.hero-input:focus-within { border-color: var(--search); box-shadow: 0 0 0 3px rgba(94,156,111,0.14); }
.hero-input input {
  flex: 1; border: none; outline: none; font: inherit; font-size: 15px;
  letter-spacing: -0.012em; color: var(--tx); background: transparent; min-width: 0;
}
.hero-input input::placeholder { color: var(--t4); }

/* Mode segmented */
.mode-seg { display: inline-flex; background: var(--s2); border: 1px solid var(--b1); border-radius: 7px; padding: 2px; }
.mode-tab {
  background: transparent; border: none;
  padding: 5px 10px; border-radius: 5px;
  cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 500; color: var(--t3); letter-spacing: -0.008em;
  transition: all 120ms ease;
}
.mode-tab.active { background: #fff; color: var(--tx); box-shadow: 0 1px 2px rgba(0,0,0,0.04); font-weight: 600; }
.mode-tab .cost {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px; font-weight: 500; letter-spacing: 0;
  padding: 1px 5px; border-radius: 3px; background: var(--s3); color: var(--t3);
}
.mode-tab.active .cost { background: var(--s2); }

/* Scope chips row */
.scope-row {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  padding-bottom: 10px;
}
.scope-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 500;
  padding: 3px 4px 3px 8px; border-radius: 999px;
  background: #fff; border: 1px solid var(--b1);
  cursor: default; color: var(--t2);
  transition: border-color 120ms ease;
}
.scope-chip:hover { border-color: var(--b2); }
.scope-chip .x-btn {
  width: 16px; height: 16px; border-radius: 50%; background: transparent; color: var(--t3);
  border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
}
.scope-chip .x-btn:hover { background: var(--s2); color: var(--tx); }

.scope-add {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11.5px; font-weight: 500; color: var(--t3);
  padding: 3px 9px; border-radius: 999px;
  background: transparent; border: 1px dashed var(--b2); cursor: pointer;
}
.scope-add:hover { color: var(--tx); border-color: var(--t3); background: var(--s2); }

/* Target picker popover */
.popover {
  position: absolute; z-index: 50; top: calc(100% + 4px); left: 0;
  width: 360px; background: #fff; border: 1px solid var(--b1); border-radius: 10px;
  box-shadow: 0 10px 32px rgba(10,10,11,0.09), 0 2px 6px rgba(10,10,11,0.05);
  padding: 10px; animation: slideDown 140ms ease;
}
.popover-search {
  display: flex; align-items: center; gap: 8px;
  background: var(--s2); border: 1px solid var(--b1); border-radius: 7px;
  padding: 7px 10px; margin-bottom: 8px;
}
.popover-search input {
  flex: 1; border: none; outline: none; background: transparent; font: inherit; font-size: 13px;
}
.popover-tabs { display: flex; gap: 2px; margin-bottom: 8px; border-bottom: 1px solid var(--b1); }
.popover-tab {
  flex: 1; background: transparent; border: none; padding: 7px 10px;
  font-size: 12px; font-weight: 500; color: var(--t3); cursor: pointer;
  border-bottom: 2px solid transparent; letter-spacing: -0.008em;
}
.popover-tab.active { color: var(--tx); border-bottom-color: var(--tx); font-weight: 600; }
.popover-tab:hover:not(.active) { color: var(--t2); }
.popover-list { max-height: 260px; overflow: auto; display: flex; flex-direction: column; gap: 2px; }
.popover-section { font-size: 10.5px; color: var(--t3); text-transform: uppercase; letter-spacing: 0.06em; padding: 6px 8px 4px; font-weight: 600; }
.popover-item {
  padding: 7px 8px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; gap: 10px;
}
.popover-item:hover { background: var(--s2); }
.popover-item.active { background: var(--s2); }

/* Status strip */
.status-strip {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border-radius: 8px; padding: 9px 14px;
  border: 1px solid var(--b1);
  transition: border-color 160ms ease, background 160ms ease;
}
.status-strip.scout { border-color: rgba(94,156,111,0.35); background: rgba(94,156,111,0.03); }
.status-strip.keyword { border-color: rgba(94,106,210,0.28); background: rgba(94,106,210,0.03); }

/* Pulse dot */
.pd { width: 6px; height: 6px; border-radius: 50%; display: inline-block; position: relative; }
.pd::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%; background: inherit;
  animation: pingRing 2s cubic-bezier(0,0,0.2,1) infinite;
}

/* Reasoning line */
.reasoning-line {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--t3); letter-spacing: 0; line-height: 1.6;
  display: inline-flex; align-items: center; gap: 6px;
}

/* Scope section in filter */
.filter-scope-type {
  margin-bottom: 10px;
}
.filter-scope-type-hdr {
  display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--t3); margin-bottom: 5px;
}
.filter-scope-chip {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 4px 3px 7px; border-radius: 5px;
  background: var(--s1); border: 1px solid var(--b1);
  font-size: 11px; color: var(--t2); margin: 2px 3px 2px 0;
}
.filter-scope-chip .x {
  width: 14px; height: 14px; border-radius: 3px; display: inline-flex; align-items: center; justify-content: center;
  color: var(--t3); cursor: pointer;
}
.filter-scope-chip .x:hover { background: var(--s2); color: var(--tx); }

/* Result paper */
.paper-row { animation: fadeIn 180ms ease; }

/* ── Collapsible panels ──────────────────────────────── */
.panel-toggle-btn {
  width: 24px; height: 24px; border-radius: 5px;
  border: 1px solid var(--b1); background: var(--s1); color: var(--t3);
  cursor: pointer; display: inline-flex; align-items: center; justify-content: center;
  transition: background 120ms ease, color 120ms ease;
  flex-shrink: 0;
}
.panel-toggle-btn:hover { background: var(--s2); color: var(--t2); border-color: var(--b2); }

.sidebar-collapsed-strip {
  width: 40px; border-right: 1px solid var(--b1); background: var(--s2); flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; padding: 10px 0 10px; gap: 4px;
}
.preview-collapsed-strip {
  width: 40px; border-left: 1px solid var(--b1); background: var(--s1); flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; padding: 10px 0; gap: 4px;
}

.sec-hdr {
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 0; user-select: none;
  font-size: 11px; font-weight: 600; color: var(--t3);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.sec-hdr:hover { color: var(--t2); }
.sec-body { overflow: hidden; }
.sec-body.closed { display: none; }

.bottom-nav { display: none; }
@media (max-width: 900px) {
  .desktop-sidebar { display: none !important; }
  .bottom-nav { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--b1); z-index: 100; padding: 4px 0 6px; }
  .main-wrap { padding-bottom: 64px !important; }
}
</style>
</head>

/* ── TARGET PICKER POPOVER ──────────────────────────── */
const TargetPicker = ({ initialTab = 'conference', onClose, onAdd, activeIds }) => {
  const [tab, setTab] = useState(initialTab);
  const [q, setQ] = useState('');
  const inputRef = useRef(null);
  useEffect(() => { inputRef.current?.focus(); }, []);
  useEffect(() => {
    const close = e => { if (!e.target.closest('.popover')) onClose(); };
    // delay to skip the click that opened the popover
    const t = setTimeout(() => document.addEventListener('mousedown', close), 0);
    return () => { clearTimeout(t); document.removeEventListener('mousedown', close); };
  }, [onClose]);

  const catalog = TARGET_CATALOG[tab] || {};
  const ql = q.trim().toLowerCase();
  const filter = list => (list || []).filter(it => !ql || it.label.toLowerCase().includes(ql));
  const pop = filter(catalog.popular);
  const rec = filter(catalog.recent);

  return (
    <div className="popover" onClick={(e) => e.stopPropagation()}>
      <div className="popover-search">
        <Icon name="search" size={13} color={T.t3} />
        <input ref={inputRef} placeholder={`${TARGET_TYPE[tab].label} 이름 검색…`} value={q} onChange={e => setQ(e.target.value)} />
      </div>
      <div className="popover-tabs">
        {Object.entries(TARGET_TYPE).map(([id, cfg]) => (
          <button key={id} className={`popover-tab ${tab === id ? 'active' : ''}`} onClick={() => setTab(id)}>
            <Icon name={cfg.icon} size={11} color={tab === id ? T.tx : T.t3} style={{ marginRight: 5, verticalAlign: '-1px' }} />
            {cfg.label}
          </button>
        ))}
      </div>
      <div className="popover-list">
        {!!pop.length && <div className="popover-section">Popular</div>}
        {pop.map(it => {
          const isActive = activeIds.includes(it.id);
          return (
            <div key={it.id} className={`popover-item ${isActive ? 'active' : ''}`}
                 onClick={() => { if (!isActive) onAdd({ id: it.id, type: tab, label: it.label, meta: it }); }}>
              <Icon name={TARGET_TYPE[tab].icon} size={13} color={TARGET_TYPE[tab].color} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12.5, color: T.tx, fontWeight: 500 }}>{it.label}</div>
                {(it.kind || it.inst || it.venue) && (
                  <div style={{ fontSize: 10.5, color: T.t3, marginTop: 1 }}>
                    {it.kind === 'lab' && 'Research lab'}
                    {it.kind === 'corp' && 'Industry'}
                    {it.inst && `@ ${it.inst}`}
                    {it.venue && `venue: ${it.venue}`}
                  </div>
                )}
              </div>
              {isActive ? (
                <Icon name="check" size={12} color={T.search} />
              ) : (
                <Icon name="plus" size={12} color={T.t3} />
              )}
            </div>
          );
        })}
        {!!rec.length && <div className="popover-section" style={{ marginTop: 4 }}>Recent</div>}
        {rec.map(it => (
          <div key={it.id} className="popover-item" onClick={() => onAdd({ id: it.id, type: tab, label: it.label })}>
            <Icon name="history" size={12} color={T.t3} />
            <span style={{ fontSize: 12.5, color: T.t2, flex: 1 }}>{it.label}</span>
            <Icon name="plus" size={12} color={T.t3} />
          </div>
        ))}
        {!pop.length && !rec.length && (
          <div style={{ padding: '22px 12px', textAlign: 'center', fontSize: 12, color: T.t3 }}>
            일치하는 {TARGET_TYPE[tab].label}이 없습니다.
          </div>
        )}
      </div>
      <div style={{ borderTop: `1px solid ${T.b1}`, marginTop: 8, paddingTop: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 10.5, color: T.t3 }}>Tip: scope을 좁힐수록 Scout 비용이 줄어듭니다</span>
        <span style={{ flex: 1 }} />
        <button className="btn-g" style={{ fontSize: 11.5, padding: '3px 8px' }} onClick={onClose}>Close</button>
      </div>
    </div>
  );
};

            <button className="btn-g" style={{ fontSize: 11.5, padding: '4px 8px' }}><Icon name="download" size={12} /> Export</button>
          </div>
        </div>

        {papers.map((p, i) => {
          const v = VENUE[p.venue] || VENUE.arXiv;
          const matchedInst = scopes.find(s => s.type === 'institution' && p.inst && p.inst.toLowerCase().includes(s.label.toLowerCase().split(' ')[0]));
          const matchedConf = scopes.find(s => s.type === 'conference' && p.conf === s.id);
          return (
            <div key={p.id} onClick={() => setSel(i)} className="paper-row" style={{
              display: 'flex', alignItems: 'flex-start', gap: 14,
              padding: '14px 0', cursor: 'pointer',
              borderBottom: `1px solid ${T.b1}`,
            }}>
              <div style={{
                width: 4, alignSelf: 'stretch', borderRadius: 2,
                background: v.c, opacity: sel === i ? 1 : 0.3, flexShrink: 0,
              }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10 }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 15.5, fontWeight: 600, letterSpacing: '-0.015em', color: T.tx, lineHeight: 1.35, marginBottom: 5 }}>{p.title}</div>
                    <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap', marginBottom: 8 }}>
                      <span style={{ fontSize: 12, color: T.t2, fontWeight: 500 }}>{p.auth}</span>
                      <span style={{ color: T.t4, fontSize: 10 }}>·</span>
                      <VenueTag venue={p.venue} />
                      <span style={{ fontSize: 12, color: T.t3, ...mono }}>{p.year}</span>
                      <span style={{ color: T.t4, fontSize: 10 }}>·</span>
                      <span style={{ fontSize: 11.5, color: T.t3, display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                        <Icon name="quote" size={11} color={T.t3} /> {p.cites}
                      </span>
                      {p.inst && (
                        <span style={{ fontSize: 11, color: matchedInst ? T.research : T.t3, display: 'inline-flex', alignItems: 'center', gap: 3, fontWeight: matchedInst ? 600 : 400 }}>
                          <Icon name="cap" size={10} color={matchedInst ? T.research : T.t3} />
                          {p.inst}
                        </span>
                      )}
                      {p.code && <Tag label="code" color={T.search} />}
                      {p.saved && <Tag label="saved" color={T.read} dot />}
                      {(matchedInst || matchedConf) && (
                        <Tag label="in scope" color={T.search} dot />
                      )}
                    </div>
                    <div style={{ fontSize: 12.5, color: T.t2, lineHeight: 1.6, marginBottom: 6 }}>{p.abs}</div>
                    {mode === 'scout' && (
                      <div className="reasoning-line">
                        <Icon name="sparkles" size={10} color={T.search} />
                        <span>scout · {p.reason}</span>
                      </div>
                    )}
                  </div>
                  <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 4, flexShrink: 0, width: 80 }}>
                    <span style={{ fontSize: 18, fontWeight: 650, letterSpacing: '-0.03em', ...mono, color: p.rel >= 90 ? T.search : p.rel >= 75 ? T.read : T.t2 }}>{p.rel}</span>
                    <RelevanceBar value={p.rel} width={68} height={3} />
                    <span style={{ fontSize: 10, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                      {mode === 'scout' ? 'relevance' : 'match'}
                    </span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

/* ── PREVIEW PANE ───────────────────────────────────── */
const Preview = ({ sp, isOpen, onToggle }) => {
  if (!isOpen) {
    return (
      <div className="preview-collapsed-strip">
        <button className="panel-toggle-btn" onClick={onToggle} title="프리뷰 펼치기">
          <Icon name="chevL" size={13} color={T.t2} />
        </button>
        <div style={{ width: 20, height: 1, background: T.b1, margin: '4px 0' }} />
        <button className="panel-toggle-btn" onClick={onToggle} title="Paper preview" style={{ opacity: 0.55 }}>
          <Icon name="book" size={12} color={T.t2} />
        </button>
      </div>
    );
  }
  return (
    <div style={{ width: 300, borderLeft: `1px solid ${T.b1}`, background: T.s1, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
      <div style={{ padding: '12px 16px', borderBottom: `1px solid ${T.b1}`, display: 'flex', alignItems: 'flex-start', gap: 8 }}>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 10.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 6 }}>Paper</div>
          <div style={{ fontSize: 13.5, fontWeight: 550, lineHeight: 1.4, marginBottom: 8, letterSpacing: '-0.01em' }}>{sp.title}</div>
          <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
            <Tag label={sp.auth} /><VenueTag venue={sp.venue} />
            <Tag label={`${sp.cites} cites`} />
            {sp.code && <Tag label="code" color={T.search} />}
          </div>
        </div>
        <button className="panel-toggle-btn" onClick={onToggle} title="프리뷰 접기" style={{ marginTop: 2 }}>
          <Icon name="chevR" size={13} color={T.t2} />
        </button>
      </div>
      <div style={{ flex: 1, overflow: 'auto', padding: '14px 16px' }}>
        <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Abstract</div>
        <div style={{ fontSize: 12.5, color: T.t2, lineHeight: 1.65, marginBottom: 14 }}>{sp.abs}</div>
        {sp.inst && (
          <>
            <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Affiliation</div>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, fontSize: 12.5, color: T.t2, padding: '5px 8px', background: T.s2, borderRadius: 5, marginBottom: 14 }}>
              <Icon name="cap" size={12} color={T.research} />
              {sp.inst}
            </div>
          </>
        )}
        <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Why relevant</div>
        <div className="reasoning-line" style={{ fontSize: 11.5, marginBottom: 14 }}>
          <Icon name="sparkles" size={11} color={T.search} /> {sp.reason}
        </div>
        <div style={{ fontSize: 11, color: T.t3, marginBottom: 6 }}>Tags</div>
        <div style={{ display: 'flex', gap: 4, flexWrap: 'wrap' }}>
          {sp.tags.map(t => <Tag key={t} label={t} />)}
        </div>
      </div>
      <div style={{ padding: '12px 16px', borderTop: `1px solid ${T.b1}`, display: 'flex', gap: 7 }}>
        <button className="btn-p" style={{ flex: 1, justifyContent: 'center' }}>
          <Icon name="bookmark" size={12} />Save
        </button>
        <button className="btn-s" style={{ flex: 1, justifyContent: 'center' }}>
          Read <Icon name="arrowR" size={12} />
        </button>
      </div>
    </div>
  );
};

/* ── SEARCH SCREEN ──────────────────────────────────── */
function SearchScreen() {
  const [mode, setMode] = useState('scout');
  const [q, setQ] = useState('RAG reranker cost 줄이는 방법');
  const [scopes, setScopes] = useState([
    { id: 'acl24', type: 'conference', label: 'ACL 2024' },
    { id: 'stanford_nlp', type: 'institution', label: 'Stanford NLP Group' },
  ]);
  const [venues, setVenues] = useState(['arXiv', 'ACL', 'EMNLP']);
  const [years, setYears] = useState(['2024', '2023']);
  const [rel, setRel] = useState(70);
  const [sel, setSel] = useState(0);
  const [pickerType, setPickerType] = useState(null);
  const [filterOpen, setFilterOpen] = useState(true);
  const [previewOpen, setPreviewOpen] = useState(true);

  const papers = PAPERS;
  const sp = papers[sel];

  const sidebarOpenPicker = (type) => setPickerType(type);

  // picker overlay left offset: workflow sidebar + filter width + padding
  const pickerLeft = 232 + (filterOpen ? 208 : 40) + 24;

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100%', overflow: 'hidden' }}>
      <div style={{ flex: 1, display: 'flex', overflow: 'hidden' }}>
        <FilterSidebar
          scopes={scopes} setScopes={setScopes} openPicker={sidebarOpenPicker}
          venues={venues} setVenues={setVenues}
          years={years} setYears={setYears}
          rel={rel} setRel={setRel}
          isOpen={filterOpen} onToggle={() => setFilterOpen(v => !v)}
        />

        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
          <Hero mode={mode} setMode={setMode} q={q} setQ={setQ} scopes={scopes} setScopes={setScopes} />
          <ResultsList papers={papers} sel={sel} setSel={setSel} mode={mode} scopes={scopes} />
        </div>

        <Preview sp={sp} isOpen={previewOpen} onToggle={() => setPreviewOpen(v => !v)} />
      </div>

      {pickerType && (
        <div style={{
          position: 'fixed', left: pickerLeft, top: 80, zIndex: 80,
        }}>
          <TargetPicker initialTab={pickerType}
                        activeIds={scopes.map(s => s.id)}
                        onAdd={(s) => { setScopes(prev => prev.some(x => x.id === s.id) ? prev : [...prev, s]); }}
                        onClose={() => setPickerType(null)} />
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
