<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES Reading — v3 Adaptive Stack</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
:root {
  --bg:#fbfbfa; --sb:#f5f5f4; --s1:#ffffff; --s2:#f7f7f6; --s3:#f0efed;
  --b1:#e8e8e6; --b2:#d4d4d2;
  --tx:#0a0a0b; --t2:#4a4a50; --t3:#8a8a92; --t4:#b0b0b8;
  --read:#5e6ad2; --search:#5e9c6f; --research:#8957c9; --result:#c07b3a; --insight:#c04e68; --writing:#3aa3a3;
}
html, body { height:100%; }
body { font-family:'Inter',-apple-system,sans-serif; font-feature-settings:'cv11','ss01','ss03'; background:var(--bg); color:var(--tx); overflow:hidden; -webkit-font-smoothing:antialiased; font-size:13px; letter-spacing:-0.006em; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
::-webkit-scrollbar { width:6px; height:6px; }
::-webkit-scrollbar-thumb { background:#d8d7d3; border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:#b8b7b3; }
button { font-family:inherit; }

.tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:500; padding:1px 7px; border-radius:4px; background:var(--s2); color:var(--t2); border:1px solid var(--b1); white-space:nowrap; letter-spacing:-0.003em; }
.kbd { font-family:'Inter',sans-serif; font-size:10.5px; font-weight:500; color:var(--t3); background:var(--s1); border:1px solid var(--b1); border-radius:3px; padding:0 5px; min-width:18px; height:18px; display:inline-flex; align-items:center; justify-content:center; }
.btn-p { background:#18181b; color:#fff; border:none; border-radius:6px; padding:5px 11px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.006em; }
.btn-p:hover { background:#26262b; }
.btn-s { background:var(--s1); color:var(--tx); border:1px solid var(--b1); border-radius:6px; padding:4px 10px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; letter-spacing:-0.006em; }
.btn-s:hover { background:var(--s2); border-color:var(--b2); }
.btn-ghost { background:transparent; color:var(--t2); border:none; border-radius:5px; padding:4px 8px; font-size:12.5px; font-weight:500; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
.btn-ghost:hover { background:rgba(0,0,0,0.04); color:var(--tx); }

.app { height:100vh; display:flex; flex-direction:column; background:var(--bg); }
.chrome { height:40px; flex-shrink:0; background:var(--sb); border-bottom:1px solid var(--b1); display:flex; align-items:center; gap:10px; padding:0 14px; font-size:12px; color:var(--t3); }
.chrome .crumb { display:inline-flex; align-items:center; gap:6px; }
.chrome .crumb .sep { color:var(--t4); }
.metabar { height:58px; flex-shrink:0; background:var(--s1); border-bottom:1px solid var(--b1); padding:0 20px; display:flex; align-items:center; gap:14px; }
.metabar .title { font-size:14px; font-weight:550; letter-spacing:-0.012em; color:var(--tx); max-width:540px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.metabar .byline { color:var(--t3); font-size:12px; display:flex; align-items:center; gap:6px; margin-top:2px; }
.metabar .meta-actions { margin-left:auto; display:flex; align-items:center; gap:6px; }

.main { flex:1; display:flex; min-height:0; }

/* Left rail (same as v1) */
.rail { width:220px; flex-shrink:0; background:var(--sb); border-right:1px solid var(--b1); display:flex; flex-direction:column; min-height:0; }
.rail-section { display:flex; flex-direction:column; min-height:0; }
.rail-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 14px 6px; font-size:10.5px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.08em; }
.rail-hdr .count { color:var(--t4); font-weight:500; letter-spacing:0; text-transform:none; font-size:11px; }
.rail-search { margin:2px 10px 8px; background:var(--s1); border:1px solid var(--b1); border-radius:5px; padding:5px 9px; display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--t3); }
.rail-search input { flex:1; background:transparent; border:none; outline:none; font-size:11.5px; color:var(--tx); font-family:inherit; }
.lib-list { flex:1; overflow:auto; padding:0 6px 8px; }
.lib-item { padding:7px 10px; border-radius:6px; cursor:pointer; display:flex; flex-direction:column; gap:3px; margin-bottom:1px; }
.lib-item.active { background:rgba(94,106,210,0.06); }
.lib-item:hover:not(.active) { background:rgba(0,0,0,0.028); }
.lib-item .t { font-size:12px; line-height:1.35; letter-spacing:-0.008em; color:var(--tx); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.lib-item .m { font-size:10.5px; color:var(--t3); display:flex; align-items:center; gap:5px; }
.lib-item .bar { height:2px; border-radius:1px; background:var(--s3); overflow:hidden; margin-top:3px; }
.lib-item .bar > i { display:block; height:100%; background:var(--read); }
.rail-divider { height:1px; background:var(--b1); margin:6px 0; }
.outline { padding:0 6px 10px; }
.outline-item { padding:6px 10px 6px 12px; display:flex; align-items:center; gap:8px; font-size:12px; color:var(--t2); border-radius:5px; cursor:pointer; border-left:2px solid transparent; }
.outline-item.active { background:rgba(94,106,210,0.05); border-left-color:var(--read); color:var(--tx); font-weight:550; }
.outline-item:hover:not(.active) { background:rgba(0,0,0,0.028); }

/* Stage area — can be row or column */
.stage { flex:1; display:flex; min-width:0; }
.stage.horizontal { flex-direction:row; }
.stage.vertical { flex-direction:column; }
.pane { display:flex; flex-direction:column; background:var(--bg); min-width:0; min-height:0; overflow:hidden; }
.pane-hdr { height:42px; flex-shrink:0; border-bottom:1px solid var(--b1); background:var(--s1); display:flex; align-items:center; padding:0 12px; gap:2px; }
.pane-tab { padding:6px 11px; font-size:12.5px; font-weight:500; color:var(--t3); border-radius:5px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; position:relative; }
.pane-tab:hover { color:var(--t2); background:rgba(0,0,0,0.028); }
.pane-tab.active { color:var(--tx); }
.pane-tab.active::after { content:''; position:absolute; bottom:-11px; left:8px; right:8px; height:2px; background:var(--read); border-radius:1px 1px 0 0; }
.pane-actions { margin-left:auto; display:flex; align-items:center; gap:4px; }
.pane-icon-btn { width:26px; height:26px; border-radius:5px; background:transparent; border:none; color:var(--t3); cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }
.pane-icon-btn:hover { background:rgba(0,0,0,0.04); color:var(--t2); }
.pane-body { flex:1; overflow:auto; position:relative; min-height:0; }

/* Orientation toggle (between pane headers) */
.orient-toggle { display:inline-flex; border:1px solid var(--b1); border-radius:6px; overflow:hidden; background:var(--s1); }
.orient-toggle button { border:none; background:transparent; padding:3px 7px; color:var(--t3); cursor:pointer; display:inline-flex; align-items:center; gap:4px; font-size:11px; }
.orient-toggle button.active { background:rgba(94,106,210,0.1); color:var(--read); }
.orient-toggle button:hover:not(.active) { background:rgba(0,0,0,0.04); color:var(--t2); }

/* Resize handles */
.resize-h { width:5px; flex-shrink:0; background:var(--b1); position:relative; cursor:col-resize; }
.resize-v { height:5px; flex-shrink:0; background:var(--b1); position:relative; cursor:row-resize; }
.resize-h:hover, .resize-v:hover { background:var(--read); }
.resize-h::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:1px; height:22px; background:var(--b2); border-radius:1px; }
.resize-v::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:22px; height:1px; background:var(--b2); border-radius:1px; }

/* Width-notice banner (shown when viewport is narrow) */
.narrow-banner { display:none; padding:8px 16px; background:rgba(94,106,210,0.07); border-bottom:1px solid rgba(94,106,210,0.2); font-size:11.5px; color:var(--read); align-items:center; gap:8px; }
@media (max-width:1100px) { .narrow-banner { display:flex; } }

.pdf { padding:22px 24px; display:flex; flex-direction:column; gap:16px; align-items:center; min-height:100%; background:#f4f3ef; }
.pdf-page { width:94%; max-width:560px; aspect-ratio:210/297; background:#fff; border:1px solid var(--b1); border-radius:4px; box-shadow:0 2px 6px rgba(15,15,15,0.04), 0 1px 2px rgba(15,15,15,0.03); padding:44px 46px 36px; font-family:'Times New Roman',Georgia,serif; font-size:10.5px; color:#1a1a1d; line-height:1.6; position:relative; }
.pdf-page h1 { font-size:14.5px; font-weight:700; line-height:1.3; margin-bottom:10px; color:#0a0a0b; }
.pdf-page .aut { font-size:10px; color:#3a3a3e; margin-bottom:10px; }
.pdf-page .abs-h { font-size:10.5px; font-weight:700; margin:8px 0 4px; }
.pdf-page p { margin-bottom:9px; text-align:justify; hyphens:auto; }
.pdf-page h2 { font-size:11.5px; font-weight:700; margin:12px 0 5px; }
.pdf-page .pgnum { position:absolute; bottom:18px; right:22px; font-size:9px; color:#8a8a92; }
.pdf-sep { font-size:11px; color:var(--t3); letter-spacing:0.06em; }

.summary-wrap { padding:24px 28px; max-width:720px; margin:0 auto; }
.summary-block { margin-bottom:22px; }
.summary-label { font-size:10px; font-weight:600; color:var(--t3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:8px; display:inline-flex; align-items:center; gap:6px; }
.summary-body { font-size:13px; line-height:1.7; color:var(--tx); }
.summary-list { list-style:none; display:flex; flex-direction:column; gap:7px; }
.summary-list li { display:flex; gap:10px; align-items:flex-start; font-size:12.8px; line-height:1.6; color:var(--t2); }
.summary-list li .bullet { width:5px; height:5px; border-radius:50%; margin-top:7px; flex-shrink:0; }
.empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:48px 32px; gap:12px; color:var(--t3); text-align:center; height:100%; }
.empty-state .title { font-size:14px; color:var(--tx); font-weight:550; }
.empty-state .sub { font-size:12.5px; line-height:1.55; max-width:320px; }

.chat-wrap { display:flex; flex-direction:column; height:100%; }
.chat-body { flex:1; overflow:auto; padding:12px 16px; display:flex; flex-direction:column; gap:12px; }
.bubble { display:flex; gap:10px; }
.bubble.user { align-self:flex-end; max-width:84%; }
.bubble.user .avatar { display:none; }
.bubble.user .content { background:var(--s2); border:1px solid var(--b1); border-radius:10px 10px 2px 10px; padding:7px 11px; font-size:12.8px; line-height:1.55; }
.bubble.assistant { max-width:92%; }
.bubble .avatar { width:22px; height:22px; border-radius:6px; background:rgba(94,106,210,0.1); color:var(--read); display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:1px; }
.bubble .content { font-size:12.8px; line-height:1.6; color:var(--tx); }
.cite { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:2px 7px; margin:6px 4px 0 0; background:var(--s2); border:1px solid var(--b1); border-radius:4px; color:var(--t2); cursor:pointer; }
.cite:hover { background:var(--s3); color:var(--tx); }
.cite .dot { width:4px; height:4px; border-radius:50%; background:var(--read); }
.chat-input { border-top:1px solid var(--b1); background:var(--s1); padding:9px 12px 11px; }
.chat-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:7px; }
.chip { font-size:10.5px; padding:2px 7px; background:rgba(94,106,210,0.08); color:var(--read); border:1px solid rgba(94,106,210,0.24); border-radius:4px; display:inline-flex; align-items:center; gap:4px; }
.chip .x { cursor:pointer; opacity:0.7; }
.chat-input-box { display:flex; gap:8px; align-items:flex-end; background:var(--s1); border:1px solid var(--b1); border-radius:8px; padding:6px 8px; }
.chat-input-box textarea { flex:1; resize:none; border:none; outline:none; font-family:inherit; font-size:13px; color:var(--tx); background:transparent; max-height:80px; line-height:1.5; }
.chat-input-box .send { width:28px; height:28px; border-radius:6px; background:var(--tx); color:#fff; border:none; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; }

.notes-wrap { padding:12px 14px; display:flex; flex-direction:column; gap:9px; }
.note-card { background:var(--s1); border:1px solid var(--b1); border-radius:7px; padding:9px 11px; display:flex; flex-direction:column; gap:6px; }
.note-head { display:flex; align-items:center; gap:6px; }
.note-head .pg { margin-left:auto; font-size:10.5px; color:var(--t3); font-family:'JetBrains Mono',monospace; }
.note-quote { font-size:11.5px; color:var(--t2); line-height:1.55; padding:5px 9px; background:var(--s2); border-left:2px solid var(--b2); border-radius:3px; font-style:italic; }
.note-memo { font-size:12.3px; line-height:1.55; color:var(--tx); }
.note-actions { display:flex; gap:4px; margin-top:1px; }

.assets-wrap { padding:12px 14px; }
.assets-toolbar { display:flex; align-items:center; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
.asset-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:9px; }
.asset-card { border:1px solid var(--b1); border-radius:7px; background:var(--s1); overflow:hidden; cursor:pointer; transition:border-color 120ms; }
.asset-card:hover { border-color:var(--b2); }
.asset-thumb { aspect-ratio:4/3; background:var(--s2); border-bottom:1px solid var(--b1); display:flex; align-items:center; justify-content:center; color:var(--t4); position:relative; overflow:hidden; }
.asset-meta { padding:6px 9px; }
.asset-kind { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.08em; }
.asset-caption { font-size:11.3px; color:var(--tx); line-height:1.4; margin-top:2px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.asset-pg { font-size:10px; color:var(--t4); font-family:'JetBrains Mono',monospace; margin-top:2px; }

.variant { position:fixed; top:8px; right:12px; z-index:50; font-size:11px; padding:3px 9px; border-radius:999px; background:rgba(94,106,210,0.12); color:var(--read); border:1px solid rgba(94,106,210,0.3); font-weight:500; }
.variant .sub { margin-left:6px; color:var(--t3); font-weight:400; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useEffect } = React;

const T = {
  bg:'#fbfbfa', sb:'#f5f5f4', s1:'#ffffff', s2:'#f7f7f6', s3:'#f0efed',
  b1:'#e8e8e6', b2:'#d4d4d2', tx:'#0a0a0b', t2:'#4a4a50', t3:'#8a8a92', t4:'#b0b0b8',
  read:'#5e6ad2', search:'#5e9c6f', research:'#8957c9', result:'#c07b3a', insight:'#c04e68', writing:'#3aa3a3',
};
const mono = { fontFamily:"'JetBrains Mono',monospace" };

const Icon = ({ name, size=15, color='currentColor', style={} }) => {
  const p = { width:size, height:size, viewBox:'0 0 24 24', fill:'none', stroke:color, strokeWidth:1.75, strokeLinecap:'round', strokeLinejoin:'round', style };
  const paths = {
    search:<><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></>,
    book:<><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></>,
    sparkles:<><path d="M12 3v3M12 18v3M3 12h3M18 12h3M5.6 5.6l2.1 2.1M16.3 16.3l2.1 2.1M5.6 18.4l2.1-2.1M16.3 7.7l2.1-2.1"/></>,
    pdf:<><path d="M14 3v5h5"/><path d="M14 3H6a2 2 0 00-2 2v14a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M9 14h6M9 17h6M9 11h2"/></>,
    chat:<><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></>,
    note:<><path d="M4 4h12l4 4v12H4z"/><path d="M16 4v4h4"/><path d="M8 12h8M8 16h5"/></>,
    grid:<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>,
    send:<><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></>,
    highlight:<><path d="M12 20l9-9-4-4-9 9v4z"/><path d="M14 7l4 4"/><path d="M3 21h7"/></>,
    pen:<><path d="M17 3l4 4L7 21H3v-4L17 3z"/></>,
    quote:<><path d="M6 8c0-1 1-2 2-2h2v6H6V8zM14 8c0-1 1-2 2-2h2v6h-4V8z"/></>,
    chevR:<path d="M9 6l6 6-6 6"/>,
    chevD:<path d="M6 9l6 6 6-6"/>,
    plus:<><path d="M12 5v14M5 12h14"/></>,
    check:<path d="M20 6L9 17l-5-5"/>,
    x:<><path d="M18 6L6 18M6 6l12 12"/></>,
    dot:<circle cx="12" cy="12" r="4" fill={color} stroke="none"/>,
    moreH:<><circle cx="6" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="12" cy="12" r="1.4" fill={color} stroke="none"/><circle cx="18" cy="12" r="1.4" fill={color} stroke="none"/></>,
    arrowR:<><path d="M5 12h14M12 5l7 7-7 7"/></>,
    status_done:<><circle cx="12" cy="12" r="9" fill={color} stroke="none"/><path d="M8 12l3 3 5-6" stroke="#fff"/></>,
    status_run:<><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 019 9" stroke={color} strokeWidth="2.5"/></>,
    status_todo:<circle cx="12" cy="12" r="9" strokeDasharray="2 3"/>,
    status_queue:<circle cx="12" cy="12" r="9"/>,
    bookmark:<path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/>,
    download:<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></>,
    share:<><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 13.5l6.8 4M15.4 6.5l-6.8 4"/></>,
    columns:<><rect x="3" y="4" width="7" height="16" rx="1"/><rect x="14" y="4" width="7" height="16" rx="1"/></>,
    rows:<><rect x="3" y="3" width="18" height="7" rx="1"/><rect x="3" y="14" width="18" height="7" rx="1"/></>,
    table:<><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 10h18M3 15h18M9 5v14M15 5v14"/></>,
    image:<><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5-11 11"/></>,
    info:<><circle cx="12" cy="12" r="9"/><path d="M12 8v5M12 16v.01"/></>,
    flask:<><path d="M9 3h6"/><path d="M10 3v6L4.5 18a2 2 0 001.7 3h11.6a2 2 0 001.7-3L14 9V3"/><path d="M7 15h10"/></>,
  };
  return <svg {...p}>{paths[name]}</svg>;
};

const Tag = ({ label, color, dot }) => (
  <span className="tag" style={color ? { background:`color-mix(in srgb, ${color} 12%, transparent)`, color, borderColor:`color-mix(in srgb, ${color} 30%, transparent)` } : {}}>
    {dot && <span style={{ width:5, height:5, borderRadius:'50%', background:color||T.t3 }} />}
    {label}
  </span>
);
const Kbd = ({ children }) => <span className="kbd">{children}</span>;
const StatusIcon = ({ status }) => {
  const map = { done:T.search, running:T.result, todo:T.t3, queue:T.t4 };
  const color = map[status] || T.t3;
  if (status==='done') return <Icon name="status_done" size={13} color={color}/>;
  if (status==='running') return <span style={{ display:'inline-flex', animation:'pulse 1.5s infinite' }}><Icon name="status_run" size={13} color={color}/></span>;
  if (status==='todo') return <Icon name="status_todo" size={13} color={T.t3}/>;
  return <Icon name="status_queue" size={13} color={T.t4}/>;

function PdfView() {

        <h1>Reducing Reranker Costs in Retrieval-Augmented Generation via Adaptive Skipping</h1>
        <div className="aut">Kim, J.¹ · Park, S.² · Lee, H.¹ &nbsp;&nbsp;<sup>1</sup>KAIST &nbsp;<sup>2</sup>Seoul National University</div>
        <div className="aut" style={{ marginBottom:14 }}>ACL 2024 · arXiv:2406.XXXXX</div>
        <div className="abs-h">Abstract</div>
        <p>Retrieval-augmented generation (RAG) pipelines typically apply a neural reranker to every retrieved passage list, regardless of the retriever's confidence. We show that this full-reranking policy is wasteful on a non-trivial fraction of queries.</p>
        <p>We propose <b>Adaptive Skipping</b>, a lightweight cascade mechanism that uses a confidence score to selectively bypass the reranker. On BEIR, our method achieves <b>44.8 nDCG@10</b> while reducing reranker calls by <b>58%</b> and end-to-end latency by <b>40%</b>.</p>
        <h2>1. Introduction</h2>
        <p>Modern RAG systems combine a dense retriever with a cross-encoder reranker to surface the most relevant passages. Although rerankers improve retrieval quality, they also incur substantial compute cost.</p>

      </div>
      <div className="pdf-sep">Page 2</div>
      <div className="pdf-page">
        <h2>2. Related Work</h2>
        <p>Cascaded retrieval systems have been studied for decades in the IR literature. Matveeva et al. (2006) introduced multi-stage retrieval for web search.</p>
        <h2>3. Method</h2>
        <p>Given a query q and top-k retrieved passages, we compute a confidence score c(q) and compare it to a threshold τ. If c(q) &gt; τ, we skip the reranker entirely.</p>
        <div className="pgnum">2 / 14</div>
      </div>
    </div>
  );
}

      if (orient==='horizontal') {

        setSplitV(Math.max(30, Math.min(80, next)));
      }

    const onUp = () => drag.current = null;
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);

                <DocumentHeader tab={docTab} setTab={setDocTab} summarized={summarized} orient={orient} setOrient={setOrient}/>
                <div className="pane-body">
                  {docTab==='pdf' ? <PdfView/> : <SummaryView ready={summarized} onGen={() => setSummarized(true)}/>}
                </div>
              </div>
              <div className="resize-h" onMouseDown={onDown}/>
              <div className="pane" style={{ flex:`0 0 calc(${100-split}% - 2.5px)` }}>
                <WorkbenchHeader tab={wbTab} setTab={setWbTab} orient={orient} setOrient={setOrient}/>
                <div className="pane-body">
                  {wbTab==='chat' && <ChatView parsed={parsed}/>}
                  {wbTab==='notes' && <NotesView/>}
                  {wbTab==='assets' && <AssetsView/>}
                </div>
              </div>
            </>
          ) : (
            <>
              <div className="pane" style={{ flex:`0 0 calc(${split}% - 2.5px)` }}>
                <DocumentHeader tab={docTab} setTab={setDocTab} summarized={summarized} orient={orient} setOrient={setOrient}/>
                <div className="pane-body">
                  {docTab==='pdf' ? <PdfView/> : <SummaryView ready={summarized} onGen={() => setSummarized(true)}/>}
                </div>
              </div>
              <div className="resize-v" onMouseDown={onDown}/>
              <div className="pane" style={{ flex:`0 0 calc(${100-split}% - 2.5px)` }}>
                <WorkbenchHeader tab={wbTab} setTab={setWbTab} orient={orient} setOrient={setOrient}/>
                <div className="pane-body">
                  {wbTab==='chat' && <ChatView parsed={parsed}/>}
                  {wbTab==='notes' && <NotesView/>}
                  {wbTab==='assets' && <AssetsView/>}
                </div>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Reading/>);
</script>
</body>
</html>
