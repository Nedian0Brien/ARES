<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARES — Search Refined Concepts</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #fbfbfa;
  --sb: #f5f5f4;
  --s1: #ffffff;
  --s2: #f7f7f6;
  --s3: #f0efed;
  --b1: #e8e8e6;
  --b2: #d4d4d2;
  --tx: #0a0a0b;
  --t2: #4a4a50;
  --t3: #8a8a92;
  --t4: #b0b0b8;
}
body {
  font-family: 'Inter', -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  background: var(--bg);
  color: var(--tx);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
  letter-spacing: -0.006em;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes fadeIn { from{opacity:0; transform: translateY(4px);} to{opacity:1; transform: translateY(0);} }
@keyframes shimmer { 0%{background-position: -200% 0;} 100%{background-position: 200% 0;} }
@keyframes pingRing {
  0% { transform: scale(0.6); opacity: 0.9; }
  80%,100% { transform: scale(2.2); opacity: 0; }
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-thumb { background: #d8d7d3; border-radius: 3px; border: 1px solid transparent; }
::-webkit-scrollbar-thumb:hover { background: #b8b7b3; }
::-webkit-scrollbar-track { background: transparent; }

.hov:hover { background: rgba(0,0,0,0.035) !important; }
.hov-soft:hover { background: rgba(0,0,0,0.02) !important; }
.hov-card:hover { background: var(--s2) !important; border-color: #d2d1ce !important; box-shadow: 0 1px 0 rgba(0,0,0,0.02); }
.hov-row:hover { background: rgba(0,0,0,0.025) !important; }

.kbd {
  font-family: 'Inter', sans-serif; font-size: 10.5px; font-weight: 500; color: var(--t3);
  background: var(--s1); border: 1px solid var(--b1); border-radius: 3px;
  padding: 0 5px; min-width: 18px; height: 18px;
  display: inline-flex; align-items: center; justify-content: center; letter-spacing: 0;
}

button { font-family: inherit; }
.btn-p { background: #18181b; color: #fff; border: none; border-radius: 6px; padding: 6px 12px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-p:hover { background: #26262b; }
.btn-s { background: var(--s1); color: var(--tx); border: 1px solid var(--b1); border-radius: 6px; padding: 5px 11px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; letter-spacing: -0.006em; }
.btn-s:hover { background: var(--s2); border-color: var(--b2); }
.btn-g { background: transparent; color: var(--t2); border: none; border-radius: 6px; padding: 5px 10px; font-size: 13px; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
.btn-g:hover { background: var(--s2); color: var(--tx); }
.tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 500;
  padding: 1px 7px; border-radius: 4px;
  background: var(--s2); color: var(--t2);
  border: 1px solid var(--b1);
  white-space: nowrap;
  letter-spacing: -0.003em;
}

/* Concept switcher */
.concept-tabs { display: inline-flex; background: var(--s2); border: 1px solid var(--b1); border-radius: 7px; padding: 2px; }
.concept-tab {
  background: transparent; border: none; font-size: 12px; font-weight: 550; letter-spacing: -0.01em;
  color: var(--t3); padding: 4px 10px; border-radius: 5px; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px; transition: all 120ms ease;
}
.concept-tab .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.concept-tab.active { background: #fff; color: var(--tx); box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.concept-tab.active .dot { opacity: 1; }

/* Hero search (Proposal A) */
.hero-wrap {
  padding: 32px 40px 20px;
  background: linear-gradient(180deg, rgba(94,156,111,0.045) 0%, rgba(94,156,111,0) 100%);
  border-bottom: 1px solid var(--b1);
}
.hero-input {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1px solid var(--b1); border-radius: 10px;
  padding: 10px 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.015), 0 4px 24px rgba(94,156,111,0.05);
  transition: all 150ms ease;
}
.hero-input:focus-within { border-color: #5e9c6f; box-shadow: 0 0 0 3px rgba(94,156,111,0.12); }
.hero-input input {
  flex: 1; border: none; outline: none; font: inherit; font-size: 15px;
  letter-spacing: -0.012em; color: var(--tx); background: transparent; min-width: 0;
}
.hero-input input::placeholder { color: var(--t4); }

.chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11.5px; font-weight: 500; color: var(--t2);
  padding: 3px 9px; border-radius: 999px;
  background: #fff; border: 1px solid var(--b1);
  cursor: pointer; transition: all 120ms ease;
}
.chip:hover { border-color: var(--b2); background: var(--s2); }
.chip.on { background: var(--tx); color: #fff; border-color: var(--tx); }

/* Pulse dot */
.pd { width: 6px; height: 6px; border-radius: 50%; display: inline-block; position: relative; }
.pd::after {
  content: ''; position: absolute; inset: 0; border-radius: 50%; background: inherit;
  animation: pingRing 2s cubic-bezier(0,0,0.2,1) infinite;
}

/* Canvas (B) */
.canvas-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 10px; }
.paper-card-b {
  background: #fff; border: 1px solid var(--b1); border-radius: 8px; overflow: hidden;
  display: flex; flex-direction: column; cursor: pointer; transition: all 120ms ease;
}
.paper-card-b:hover { border-color: var(--b2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(10,10,11,0.045); }
.paper-card-b.sel { border-color: var(--tx); box-shadow: 0 0 0 2px rgba(10,10,11,0.06); }

/* Stream (C) */
.stream-card {
  display: flex; align-items: stretch; gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--b1); cursor: pointer;
  transition: background 120ms ease;
}
.stream-card:hover { background: var(--s2); }
.stream-card.sel { background: #fff; box-shadow: inset 3px 0 0 var(--tx); }
.venue-block {
  width: 52px; height: 52px; border-radius: 6px; flex-shrink: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; font-weight: 700; letter-spacing: -0.03em;
}
.relevance-meter { width: 130px; flex-shrink: 0; display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }

.filter-chip-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

.reasoning-line {
  font-family: 'JetBrains Mono', monospace; font-size: 10.5px;
  color: var(--t3); letter-spacing: 0; line-height: 1.6;
  display: inline-flex; align-items: center; gap: 6px;
}

.quick-action-row {
  display: flex; gap: 4px; opacity: 0;
  transition: opacity 120ms ease;
}
.stream-card:hover .quick-action-row { opacity: 1; }
.qa-btn {
  width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--b1);
  background: #fff; color: var(--t2); cursor: pointer;
  display: inline-flex; align-items: center; justify-content: center;
}
.qa-btn:hover { background: var(--s2); color: var(--tx); border-color: var(--b2); }

/* Skeleton line (used as subtle reasoning shimmer) */
.shimmer-line {
  background: linear-gradient(90deg, var(--s3) 25%, var(--s2) 50%, var(--s3) 75%);
  background-size: 200% 100%; animation: shimmer 2.2s ease-in-out infinite;
  height: 2px; border-radius: 1px;
}

/* Network mini graph */
.mini-graph { position: relative; width: 100%; height: 180px; }

.bottom-nav { display: none; }
@media (max-width: 900px) {
  .desktop-sidebar { display: none !important; }
  .bottom-nav { display: flex !important; position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid var(--b1); z-index: 100; padding: 4px 0 6px; }
  .main-wrap { padding-bottom: 64px !important; }
}
</style>
</head>

<div id="root"></div>

window.Icon = Icon;

const SECTIONS = [
  { id: 'search',   label: 'Search',   sub: '논문 서치 및 수집',        color: T.search,   icon: 'search',   kbd: '1' },
  { id: 'read',     label: 'Reading',  sub: 'AI 논문 리딩',             color: T.read,     icon: 'book',     kbd: '2' },

    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={T.s3} strokeWidth="2.5"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth="2.5"
              strokeDasharray={c} strokeDashoffset={c - (c * value / 100)} strokeLinecap="round"
              style={{ transition: 'stroke-dashoffset 400ms ease' }} />
    </svg>
  );
};

        <div style={{ borderTop: `1px solid ${T.b1}`, marginTop: 18, paddingTop: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 8 }}>Recent</div>
          {['ablation RAG 2024', 'reranker latency benchmark', 'DPR confidence'].map(q => (
            <div key={q} className="hov-soft" style={{
              padding: '4px 8px', borderRadius: 5, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 6, fontSize: 11.5, color: T.t3, marginBottom: 1,
            }}>
              <Icon name="history" size={10} color={T.t4} />
              <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{q}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Main stream */}
      <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0 }}>
        {/* Hero query + refinement */}
        <div style={{ padding: '18px 24px 14px', borderBottom: `1px solid ${T.b1}`, background: T.s1 }}>
          <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
            <div style={{
              flex: 1, display: 'flex', gap: 10, background: '#fff',
              border: `1.5px solid ${T.b1}`, borderRadius: 8, padding: '9px 13px',
              alignItems: 'center', boxShadow: '0 1px 2px rgba(0,0,0,0.02)',
            }}>
              <Icon name="search" size={16} color={T.tx} />
              <span style={{ fontSize: 14, color: T.tx, flex: 1, fontWeight: 500, letterSpacing: '-0.01em' }}>RAG reranker cost 줄이는 방법</span>
              <Kbd>⌘K</Kbd>
            </div>
            <button className="btn-p" style={{ padding: '7px 14px' }}><Icon name="search" size={12} />Search</button>
          </div>

          {/* Refinement suggestions */}
          <div style={{ display: 'flex', gap: 6, alignItems: 'center', marginTop: 11, flexWrap: 'wrap' }}>
            <span style={{ fontSize: 11, color: T.t3, display: 'inline-flex', alignItems: 'center', gap: 4 }}>
              <Icon name="wand" size={11} color={T.research} />
              Refine
            </span>
            {['+ ablation study', '+ ACL 2024만', '+ has code', '+ cite count ≥ 50'].map(r => (
              <button key={r} className="chip" style={{ fontSize: 11.5 }}>
                <span style={{ color: T.research, fontWeight: 600 }}>{r.slice(0, 1)}</span>
                <span>{r.slice(2)}</span>
              </button>
            ))}
            <span style={{ flex: 1 }} />
            <span style={{ fontSize: 11, color: T.t3, display: 'inline-flex', alignItems: 'center', gap: 5 }}>
              <PulseDot color={T.search} size={5} />
              Scout · {papers.length} matches in 0.8s
            </span>
          </div>
        </div>

        {/* Stream */}
        <div style={{ flex: 1, overflow: 'auto' }}>
          {papers.map(p => {
            const v = VENUE[p.venue] || VENUE.arXiv;
            const isSel = sel === p.id;
            const initial = (p.auth || '').split(' ')[0].slice(0, 1);
            return (
              <div key={p.id} className={`stream-card ${isSel ? 'sel' : ''}`} onClick={() => setSel(p.id)}>
                <div className="venue-block" style={{ background: v.c }}>
                  <span style={{ fontSize: 11, opacity: 0.85 }}>{initial}</span>
                  <span style={{ fontSize: 9, opacity: 0.7, marginTop: 2, ...mono, letterSpacing: 0 }}>{p.year}</span>
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14.5, fontWeight: 600, letterSpacing: '-0.012em', lineHeight: 1.35, marginBottom: 5 }}>{p.title}</div>
                  <div style={{ display: 'flex', gap: 6, alignItems: 'center', flexWrap: 'wrap', marginBottom: 6 }}>
                    <span style={{ fontSize: 11.5, color: T.t2, fontWeight: 500 }}>{p.auth}</span>
                    <span style={{ color: T.t4, fontSize: 10 }}>·</span>
                    <VenueTag venue={p.venue} />
                    <span style={{ color: T.t4, fontSize: 10 }}>·</span>
                    <span style={{ fontSize: 11.5, color: T.t3, display: 'inline-flex', alignItems: 'center', gap: 3 }}>
                      <Icon name="quote" size={11} color={T.t3} />{p.cites} cites
                    </span>
                    {p.code && <><span style={{ color: T.t4, fontSize: 10 }}>·</span><Tag label="code" color={T.search} /></>}
                    {p.saved && <Tag label="saved" color={T.read} dot />}
                  </div>
                  <div style={{ fontSize: 12.5, color: T.t2, lineHeight: 1.6, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
                    {p.abs}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginTop: 6 }}>
                    <div className="reasoning-line" style={{ flex: 1, minWidth: 0 }}>
                      <Icon name="sparkles" size={10} color={T.search} />
                      <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>scout · {p.reason}</span>
                    </div>
                    <div className="quick-action-row">
                      <button className="qa-btn" title="Save"><Icon name="bookmark" size={12} /></button>
                      <button className="qa-btn" title="Cite"><Icon name="quote" size={12} /></button>
                      <button className="qa-btn" title="Open"><Icon name="ext" size={12} /></button>
                    </div>
                  </div>
                </div>
                <div className="relevance-meter">
                  <div style={{ display: 'flex', alignItems: 'baseline', gap: 3 }}>
                    <span style={{ fontSize: 18, fontWeight: 650, letterSpacing: '-0.03em', ...mono, color: p.rel >= 90 ? T.search : p.rel >= 75 ? T.read : T.t2 }}>{p.rel}</span>
                    <span style={{ fontSize: 10.5, color: T.t3, ...mono }}>%</span>
                  </div>
                  <RelevanceBar value={p.rel} width={110} height={3} />
                  <span style={{ fontSize: 9.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                    {p.rel >= 90 ? 'excellent match' : p.rel >= 75 ? 'strong match' : 'partial match'}
                  </span>
                </div>
              </div>
            );
          })}
          <div style={{ padding: '14px 24px', textAlign: 'center', color: T.t3, fontSize: 12, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 }}>
            <div className="shimmer-line" style={{ width: 120 }} />
            <span>더 많은 논문 검색 중…</span>
            <div className="shimmer-line" style={{ width: 120 }} />
          </div>
        </div>
      </div>

      {/* Right: activity */}
      <div style={{ width: 240, borderLeft: `1px solid ${T.b1}`, background: T.s1, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '16px 18px 10px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ fontSize: 10.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 10 }}>Relevance distribution</div>
          <div style={{ display: 'flex', alignItems: 'flex-end', gap: 3, height: 60 }}>
            {[22, 34, 45, 60, 80, 95, 70, 40, 28, 22].map((h, i) => (
              <div key={i} style={{
                flex: 1, height: `${h}%`,
                background: h >= 80 ? T.search : h >= 60 ? T.read : T.s3,
                borderRadius: 1, transition: 'all 220ms ease',
              }} />
            ))}
          </div>
          <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 10, color: T.t3, ...mono, marginTop: 5 }}>
            <span>50%</span><span>100%</span>
          </div>
        </div>
        <div style={{ padding: '14px 18px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ fontSize: 10.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Library activity</div>
          {[
            { act: 'Saved', p: 'Reducing Reranker Costs…', time: '2h ago', c: T.search },
            { act: 'Cited', p: 'FlashRAG', time: '5h ago', c: T.read },
            { act: 'Read',  p: 'Is Reranking Necessary', time: 'yesterday', c: T.t3 },
          ].map((a, i) => (
            <div key={i} style={{ display: 'flex', gap: 8, padding: '5px 0', fontSize: 11.5 }}>
              <span style={{ width: 6, height: 6, borderRadius: '50%', background: a.c, marginTop: 5, flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ color: T.t2 }}>
                  <span style={{ fontWeight: 500, color: T.tx }}>{a.act}</span>{' '}
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis' }}>{a.p}</span>
                </div>
                <div style={{ fontSize: 10.5, color: T.t3, ...mono, marginTop: 1 }}>{a.time}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{ padding: '14px 18px' }}>
          <div style={{ fontSize: 10.5, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: 8 }}>Suggested queries</div>
          {['reranker efficient training', 'dense retriever BEIR'].map(q => (
            <div key={q} className="hov-soft" style={{
              padding: '6px 8px', borderRadius: 5, cursor: 'pointer',
              display: 'flex', alignItems: 'center', gap: 7, fontSize: 11.5, color: T.t2, marginBottom: 1,
            }}>
              <Icon name="wand" size={11} color={T.research} />
              <span style={{ flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{q}</span>
              <Icon name="arrowUpR" size={10} color={T.t3} />
            </div>
          ))}
        </div>
        <div style={{ flex: 1 }} />
        <div style={{ borderTop: `1px solid ${T.b1}`, padding: '12px 18px' }}>
          <button className="btn-p" style={{ width: '100%', justifyContent: 'center' }}>
            <Icon name="brain" size={12} />Ask Scout agent
          </button>
        </div>
      </div>
    </div>
  );
}

const CONCEPTS = [
  { id: 'A', label: 'Focal',  desc: '히어로 쿼리 + 라이브 Scout',       Comp: FocalSearch,  color: T.search },
  { id: 'B', label: 'Canvas', desc: '클러스터 그리드 + 관련 그래프',    Comp: CanvasSearch, color: T.read },
  { id: 'C', label: 'Stream', desc: '피드 스트림 + 쿼리 리파인먼트',    Comp: StreamSearch, color: T.research },
];

/* ── APP SHELL ───────────────────────────────────────────────── */
function App() {
  const [concept, setConcept] = useState(() => localStorage.getItem('ares_concept') || 'A');
  useEffect(() => { localStorage.setItem('ares_concept', concept); }, [concept]);

  useEffect(() => {
    const kb = e => {
      if ((e.metaKey || e.ctrlKey) && /^[abc]$/i.test(e.key)) {
        e.preventDefault();
        setConcept(e.key.toUpperCase());
      }
    };
    window.addEventListener('keydown', kb);
    return () => window.removeEventListener('keydown', kb);
  }, []);

  const Cur = CONCEPTS.find(c => c.id === concept) || CONCEPTS[0];
  const Comp = Cur.Comp;

  return (
    <div style={{ display: 'flex', height: '100vh', background: T.bg, overflow: 'hidden' }}>
      {/* Sidebar */}
      <div className="desktop-sidebar" style={{ width: 232, background: T.sb, borderRight: `1px solid ${T.b1}`, display: 'flex', flexDirection: 'column', flexShrink: 0 }}>
        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div className="hov" style={{ padding: '6px 8px', borderRadius: 6, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 9 }}>
            <div style={{ width: 24, height: 24, borderRadius: 6, background: 'linear-gradient(135deg, #5e6ad2, #8b5cf6)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 11, fontWeight: 700, letterSpacing: '-0.02em' }}>A</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 550, letterSpacing: '-0.01em' }}>ARES</div>
              <div style={{ fontSize: 10.5, color: T.t3 }}>Search · Refined</div>
            </div>
            <Icon name="chevD" size={13} color={T.t3} />
          </div>
        </div>

        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div className="hov-soft" style={{ padding: '5px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
            <Icon name="search" size={13.5} color={T.t3} />
            <span style={{ fontSize: 12.5, color: T.t3, flex: 1 }}>Search</span>
            <Kbd>⌘K</Kbd>
          </div>
          <div className="hov-soft" style={{ padding: '5px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8 }}>
            <Icon name="plus" size={13.5} color={T.t3} />
            <span style={{ fontSize: 12.5, color: T.t3, flex: 1 }}>New paper</span>
            <Kbd>C</Kbd>
          </div>
        </div>

        <div style={{ padding: '10px 12px', borderBottom: `1px solid ${T.b1}` }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.08em', padding: '4px 8px 6px' }}>Project</div>
          {[
            ['RAG Reranker Study', true, '#5e6ad2'],
            ['LLM Reasoning',       false, '#c04e68'],
            ['Local Inference',     false, '#3aa3a3'],
          ].map(([p, active, c], i) => (
            <div key={i} className="hov" style={{
              padding: '5px 8px', borderRadius: 5, cursor: 'pointer',
              background: active ? 'rgba(0,0,0,0.045)' : 'transparent',
              display: 'flex', alignItems: 'center', gap: 9, marginBottom: 1,
            }}>
              <span style={{ width: 8, height: 8, borderRadius: 2, background: c, flexShrink: 0 }} />
              <span style={{ fontSize: 12.5, color: active ? T.tx : T.t2, fontWeight: active ? 550 : 400, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', flex: 1 }}>{p}</span>
            </div>
          ))}
        </div>

        <div style={{ padding: '10px 12px', flex: 1, overflow: 'auto' }}>
          <div style={{ fontSize: 10.5, fontWeight: 600, color: T.t3, textTransform: 'uppercase', letterSpacing: '0.08em', padding: '4px 8px 8px' }}>Workflow</div>
          {SECTIONS.map(s => (
            <div key={s.id} className="hov" style={{
              padding: '6px 8px', borderRadius: 6, cursor: 'pointer', marginBottom: 1,
              background: s.id === 'search' ? 'rgba(0,0,0,0.05)' : 'transparent',
              display: 'flex', alignItems: 'center', gap: 10,
            }}>
              <div style={{
                width: 22, height: 22, borderRadius: 5, flexShrink: 0,
                background: s.id === 'search' ? s.color : `${s.color}1a`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }}>
                <Icon name={s.icon} size={13} color={s.id === 'search' ? '#fff' : s.color} />
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12.5, fontWeight: s.id === 'search' ? 550 : 450, color: s.id === 'search' ? T.tx : T.t2, letterSpacing: '-0.005em' }}>{s.label}</div>
              </div>
            </div>
          ))}
        </div>

        <div style={{ borderTop: `1px solid ${T.b1}`, padding: '8px 12px' }}>
          <div className="hov" style={{ padding: '6px 8px', borderRadius: 5, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 9 }}>
            <div style={{ width: 22, height: 22, borderRadius: 11, background: '#c7b299', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10.5, fontWeight: 600, letterSpacing: '-0.02em' }}>DK</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 12, fontWeight: 500, color: T.t2 }}>Dokyung</div>
              <div style={{ fontSize: 10, color: T.t3 }}>Pro plan</div>
            </div>
            <Icon name="settings" size={13} color={T.t3} />
          </div>
        </div>
      </div>

      {/* Main */}
      <div className="main-wrap" style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
        {/* Topbar with concept switcher */}
        <div style={{ padding: '0 20px', borderBottom: `1px solid ${T.b1}`, background: T.s1, display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexShrink: 0, height: 48 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 22, height: 22, borderRadius: 5, background: T.search, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <Icon name="search" size={13} color="#fff" />
            </div>
            <div style={{ fontSize: 13.5, fontWeight: 600, color: T.tx, letterSpacing: '-0.01em' }}>Search</div>
            <span style={{ fontSize: 11.5, color: T.t4 }}>·</span>
            <span style={{ fontSize: 12, color: T.t3 }}>{Cur.desc}</span>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
            <div className="concept-tabs">
              {CONCEPTS.map(c => (
                <button key={c.id} className={`concept-tab ${concept === c.id ? 'active' : ''}`}
                        style={{ color: concept === c.id ? c.color : undefined }}
                        onClick={() => setConcept(c.id)}
                        title={`${c.desc} · ⌘${c.id}`}>
                  <span className="dot" />
                  {c.id} · {c.label}
                </button>
              ))}
            </div>
            <div style={{ display: 'flex', gap: 6 }}>
              <button className="btn-s" style={{ padding: '3px 8px', fontSize: 11.5 }}><Icon name="share" size={12} /> Share</button>
              <button className="btn-s" style={{ padding: '3px 8px', fontSize: 11.5 }}><Icon name="filter" size={12} /> Filter</button>
            </div>
          </div>
        </div>
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }} key={concept}>
          <div style={{ flex: 1, display: 'flex', flexDirection: 'column', animation: 'fadeIn 220ms ease', overflow: 'hidden' }}>
            <Comp />
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
